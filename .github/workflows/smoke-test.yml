---
name: smoke-test
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  lint:
    name: lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Install dev deps
        run: uv sync --frozen
      - name: ruff check
        run: uv run ruff check
      - name: ruff format --check
        run: uv run ruff format --check
      - name: ty check
        run: uv run ty check src

  build:
    name: build + import smoke (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Build wheel + sdist
        run: uv build
      - name: Install built wheel into clean venv
        run: |
          uv venv --python ${{ matrix.python-version }} .smoke-venv
          uv pip install --python .smoke-venv/bin/python dist/*.whl
      - name: Run santai --help
        run: .smoke-venv/bin/santai --help
