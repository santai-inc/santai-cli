        function getFileIcon(filename) {
            const ext = filename.split('.').pop().toLowerCase();

            // Images
            if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'svg', 'ico', 'bmp', 'tiff'].includes(ext)) {
                return imageIcon;
            }
            // Books/Documents
            if (['epub', 'mobi', 'azw', 'azw3'].includes(ext)) {
                return bookIcon;
            }
            // PDF
            if (ext === 'pdf') {
                return pdfIcon;
            }
            // Code
            if (['js', 'ts', 'jsx', 'tsx', 'py', 'rb', 'go', 'rs', 'java', 'c', 'cpp', 'h', 'hpp', 'cs', 'php', 'swift', 'kt', 'scala', 'sh', 'bash', 'zsh', 'html', 'css', 'scss', 'sass', 'less', 'vue', 'svelte'].includes(ext)) {
                return codeIcon;
            }
            // Music/Audio
            if (['mp3', 'wav', 'flac', 'aac', 'ogg', 'm4a', 'wma'].includes(ext)) {
                return musicIcon;
            }
            // Video
            if (['mp4', 'mkv', 'avi', 'mov', 'wmv', 'flv', 'webm', 'm4v'].includes(ext)) {
                return videoIcon;
            }
            // Archives
            if (['zip', 'tar', 'gz', 'rar', '7z', 'bz2', 'xz'].includes(ext)) {
                return archiveIcon;
            }
            // Text/Markdown
            if (['txt', 'md', 'markdown', 'rst', 'rtf'].includes(ext)) {
                return textIcon;
            }
            // Config/Data
            if (['json', 'yaml', 'yml', 'toml', 'xml', 'csv', 'ini', 'cfg', 'conf'].includes(ext)) {
                return codeIcon;
            }

            return fileIcon;
        }

        const emptyIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" />
        </svg>`;

        // Navigation history for forward/back arrows
        let forwardHistory = []; // Array of path segments that can be navigated forward to
        let lastFullPath = ''; // The deepest path we've been to in current session

        function updateNavButtons() {
            const backBtn = document.getElementById('nav-back');
            const forwardBtn = document.getElementById('nav-forward');

            // Back button: enabled if we're not at root
            backBtn.disabled = !currentPath;

            // Forward button: enabled if there's forward history
            forwardBtn.disabled = forwardHistory.length === 0;
        }

        function navigateBack() {
            if (!currentPath) return;

            // Get parent path
            const parts = currentPath.split('/').filter(Boolean);
            const currentSegment = parts.pop();
            const parentPath = parts.join('/');

            // Add current segment to forward history
            forwardHistory.unshift(currentSegment);

            // Navigate to parent (skip history tracking)
            loadFilesInternal(parentPath);
        }

        function navigateForward() {
            if (forwardHistory.length === 0) return;

            // Get next segment from forward history
            const nextSegment = forwardHistory.shift();
            const newPath = currentPath ? `${currentPath}/${nextSegment}` : nextSegment;

            // Navigate forward (skip history tracking)
            loadFilesInternal(newPath);
        }

        function navigateToBreadcrumb(targetPath) {
            // Calculate forward history based on the path we're leaving
            if (lastFullPath && lastFullPath.startsWith(targetPath)) {
                // We're going back - set forward history to remaining segments
                const remaining = lastFullPath.slice(targetPath.length).split('/').filter(Boolean);
                forwardHistory = remaining;
            } else {
                // We're going to a different branch - clear forward history
                forwardHistory = [];
                lastFullPath = targetPath;
            }

            loadFilesInternal(targetPath);
        }

        // Internal load that updates nav state
        async function loadFilesInternal(path = '') {
            currentPath = path;
            selectedItem = null;
            updateNavButtons();

            const container = document.getElementById('file-grid-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
                if (!res.ok) throw new Error('Failed to load files');

                const data = await res.json();
                files = data.items;

                renderBreadcrumbs(data.breadcrumbs);
                renderFiles(files);
                updateTreeActiveState();
            } catch (err) {
                showToast('Failed to load files', true);
                container.innerHTML = `<div class="empty-state">${emptyIcon}<p>Failed to load files</p></div>`;
            }
        }

        // Load files (public API - clears forward history when navigating deeper)
        async function loadFiles(path = '') {
            // Check if navigating deeper (path is a child of currentPath)
            const isGoingDeeper = path && (
                !currentPath || // From root
                (path.startsWith(currentPath + '/')) || // Proper child
                (currentPath === '' && path) // From empty to something
            );

            if (isGoingDeeper) {
                forwardHistory = [];
                lastFullPath = path;
            }

            currentPath = path;
            selectedItem = null;
            updateNavButtons();

            const container = document.getElementById('file-grid-container');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`);
                if (!res.ok) throw new Error('Failed to load files');

                const data = await res.json();
                files = data.items;
                lastFilesHash = hashData(data.items);

                renderBreadcrumbs(data.breadcrumbs);
                renderFiles(files);
                updateTreeActiveState();
            } catch (err) {
                showToast('Failed to load files', true);
                container.innerHTML = `<div class="empty-state">${emptyIcon}<p>Failed to load files</p></div>`;
            }
        }

        // Smart refresh files (only re-render if changed)
        async function refreshFiles() {
            if (currentView !== 'browser') return;
            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(currentPath)}`);
                if (!res.ok) return;
                const data = await res.json();
                const newHash = hashData(data.items);
                if (newHash !== lastFilesHash) {
                    files = data.items;
                    lastFilesHash = newHash;
                    renderFiles(files);
                }
            } catch (err) {
                // Silent fail on refresh
            }
        }

        // Render breadcrumbs
        function renderBreadcrumbs(breadcrumbs) {
            // Sidebar breadcrumbs
            const sidebarContainer = document.getElementById('breadcrumbs');
            let sidebarHtml = '';
            breadcrumbs.forEach((b, i) => {
                if (i === 0) {
                    // First item (repo name) - combine with home icon, no separator
                    sidebarHtml += `<li class="breadcrumb-item">
                        <button class="breadcrumb-link" onclick="showFileBrowser('${b.path}')" title="Back to root" style="display:flex;align-items:center;gap:6px;">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:14px;height:14px;">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                            </svg>
                            ${b.name}
                        </button>
                    </li>`;
                } else {
                    // Subsequent items - show with separator
                    sidebarHtml += `<li class="breadcrumb-item">
                        <span class="breadcrumb-separator">/</span>
                        <button class="breadcrumb-link" onclick="showFileBrowser('${b.path}')">${b.name}</button>
                    </li>`;
                }
            });
            sidebarContainer.innerHTML = sidebarHtml;

            // Browser header breadcrumbs
            const browserContainer = document.getElementById('browser-breadcrumbs');
            let browserHtml = '';
            breadcrumbs.forEach((b, i) => {
                const isLast = i === breadcrumbs.length - 1;
                const isFirst = i === 0;
                browserHtml += `<span class="crumb">
                    ${isFirst ? '' : '<span class="crumb-sep">/</span>'}
                    <button class="crumb-link${isLast ? ' current' : ''}" ${isLast ? '' : `onclick="navigateToBreadcrumb('${b.path}')"`}>${b.name}</button>
                </span>`;
            });
            browserContainer.innerHTML = browserHtml;
        }

        // Render files
        function renderFiles(items) {
            const container = document.getElementById('file-grid-container');

            if (items.length === 0) {
                container.innerHTML = `<div class="empty-state">${emptyIcon}<p>This folder is empty</p></div>`;
                return;
            }

            const protectedFilePaths = ['codebases', 'history', 'notes', 'resources', 'AGENTS.md', 'CLAUDE.md', 'README.md', 'rumdl.toml'];
            let html = '<div class="file-grid">';
            for (const item of items) {
                const isProtected = protectedFilePaths.includes(item.path);
                const canDrag = !isProtected;
                html += `<div class="file-item"
                     data-path="${item.path}"
                     data-is-dir="${item.is_dir}"
                     data-name="${item.name}"
                     ${canDrag ? 'draggable="true"' : ''}
                     ${canDrag ? `ondragstart="handleDragStart(event, '${item.path}', '${item.name}', ${item.is_dir})"` : ''}
                     ondragend="handleDragEnd(event)"
                     ${item.is_dir ? `ondragover="handleDragOver(event, '${item.path}', true)"` : ''}
                     ${item.is_dir ? 'ondragleave="handleDragLeave(event)"' : ''}
                     ${item.is_dir ? `ondrop="handleDrop(event, '${item.path}', true)"` : ''}
                     onclick="selectItem(this, event)"
                     ondblclick="openItem('${item.path}', ${item.is_dir})"
                     oncontextmenu="showContextMenu(event, this)">
                    <div class="file-icon ${item.is_dir ? 'folder' : 'file'}">
                        ${item.is_dir ? folderIcon : getFileIcon(item.name)}
                    </div>
                    <div class="file-info">
                        <div class="file-name">${item.name}</div>
                        <div class="file-meta">${item.is_dir ? 'Folder' : item.size_formatted}</div>
                    </div>`;
                if (!isProtected) {
                    html += `<div class="file-actions">
                        <button class="file-action-btn edit-btn" onclick="event.stopPropagation(); editItem('${item.path}', '${item.name}')" title="Rename">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z" />
                            </svg>
                        </button>
                        <button class="file-action-btn delete-btn" onclick="event.stopPropagation(); deleteItem('${item.path}', '${item.name}', ${item.is_dir})" title="Delete">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                            </svg>
                        </button>
                    </div>`;
                }
                html += `</div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        // Select item
        function selectItem(el, event) {
            event.stopPropagation();
            document.querySelectorAll('.file-item').forEach(i => i.classList.remove('selected'));
            el.classList.add('selected');
            selectedItem = {
                path: el.dataset.path,
                isDir: el.dataset.isDir === 'true',
                name: el.dataset.name
            };

            // Auto-open: preview for files, navigate for folders
            if (selectedItem.isDir) {
                loadFiles(selectedItem.path);
            } else {
                openFilePreview(selectedItem.path);
            }
        }

        // Open item (navigate or fullscreen preview)
        function openItem(path, isDir) {
            if (isDir) {
                loadFiles(path);
            } else {
                // Open file preview in fullscreen mode
                openFilePreview(path);
                setTimeout(() => {
                    const panel = document.getElementById('preview-panel');
                    if (panel && !panel.classList.contains('fullscreen')) {
                        togglePreviewFullscreen();
                    }
                }, 50);
            }
        }

        // Context menu
        function showContextMenu(event, el) {
            event.preventDefault();
            selectItem(el, event);

            const menu = document.getElementById('context-menu');
            const openNewTabBtn = document.getElementById('context-open-new-tab');

            // Show "Open in New Tab" only for files, not folders
            if (selectedItem && !selectedItem.isDir) {
                openNewTabBtn.style.display = 'flex';
            } else {
                openNewTabBtn.style.display = 'none';
            }

            menu.style.left = event.clientX + 'px';
            menu.style.top = event.clientY + 'px';
            menu.classList.add('show');
        }

        // Hide context menu
        document.addEventListener('click', () => {
            document.getElementById('context-menu').classList.remove('show');
        });

        // Open in new tab
        function openSelectedInNewTab() {
            if (!selectedItem || selectedItem.isDir) return;
            const url = new URL(window.location.href);
            url.searchParams.set('preview', selectedItem.path);
            window.open(url.toString(), '_blank');
        }

        // Download
        function downloadSelected() {
            if (!selectedItem || selectedItem.isDir) return;
            window.open(`/api/files/download?path=${encodeURIComponent(selectedItem.path)}`, '_blank');
        }

        // Rename
        function showRenameModal() {
            if (!selectedItem) return;
            document.getElementById('rename-input').value = selectedItem.name;
            document.getElementById('rename-modal').classList.add('show');
            document.getElementById('rename-input').focus();
            document.getElementById('rename-input').select();
        }

        // Edit item directly (from button)
        function editItem(path, name) {
            selectedItem = { path, name };
            document.getElementById('rename-input').value = name;
            document.getElementById('rename-modal').classList.add('show');
            document.getElementById('rename-input').focus();
            document.getElementById('rename-input').select();
        }

        // Delete item directly (from button)
        async function deleteItem(path, name, isDir) {
            if (!confirm(`Delete "${name}"?`)) return;

            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to delete');
                }

                showToast('Deleted successfully');
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        // Move item (drag and drop)
        const protectedPaths = ['codebases', 'history', 'notes', 'resources', 'AGENTS.md', 'CLAUDE.md', 'README.md', 'rumdl.toml'];
        let draggedItem = null;

        function isProtectedPath(path) {
            return protectedPaths.includes(path);
        }

        function handleDragStart(event, path, name, isDir) {
            if (isProtectedPath(path)) {
                event.preventDefault();
                return;
            }
            draggedItem = { path, name, isDir };
            event.target.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', path);
        }

        function handleDragEnd(event) {
            event.target.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over', 'invalid'));
            draggedItem = null;
        }

        function handleDragOver(event, targetPath, targetIsDir) {
            event.preventDefault();
            if (!draggedItem || !targetIsDir) return;

            // Can't drop onto itself
            if (draggedItem.path === targetPath) return;
            // Can't drop into the folder it's already in
            const currentParent = draggedItem.path.split('/').slice(0, -1).join('/');
            if (currentParent === targetPath) return;
            // Can't drop a folder into itself or its descendants
            if (draggedItem.isDir && (targetPath === draggedItem.path || targetPath.startsWith(draggedItem.path + '/'))) return;

            event.dataTransfer.dropEffect = 'move';
            event.target.closest('.tree-item, .file-item')?.classList.add('drag-over');
        }

        function handleDragLeave(event) {
            event.target.closest('.tree-item, .file-item')?.classList.remove('drag-over', 'invalid');
        }

        async function handleDrop(event, targetPath, targetIsDir) {
            event.preventDefault();
            event.target.closest('.tree-item, .file-item')?.classList.remove('drag-over', 'invalid');

            if (!draggedItem || !targetIsDir) return;
            // Can't drop onto itself
            if (draggedItem.path === targetPath) return;
            // Can't drop into the folder it's already in
            const currentParent = draggedItem.path.split('/').slice(0, -1).join('/');
            if (currentParent === targetPath) return;
            // Can't drop a folder into itself or its descendants
            if (draggedItem.isDir && (targetPath === draggedItem.path || targetPath.startsWith(draggedItem.path + '/'))) return;

            // Save item data before async operation (draggedItem gets nulled by handleDragEnd)
            const itemPath = draggedItem.path;
            const itemName = draggedItem.name;

            try {
                const res = await fetch('/api/files/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source_path: itemPath,
                        target_folder: targetPath
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to move');
                }

                showToast(`Moved "${itemName}" to ${targetPath || 'root'}`);
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        async function confirmRename() {
            const newName = document.getElementById('rename-input').value.trim();
            if (!newName || !selectedItem) return;

            try {
                const res = await fetch('/api/files/rename', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_path: selectedItem.path, new_name: newName })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to rename');
                }

                closeModals();
                showToast('Renamed successfully');
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        // Delete
        async function deleteSelected() {
            if (!selectedItem) return;
            if (!confirm(`Delete "${selectedItem.name}"?`)) return;

            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(selectedItem.path)}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to delete');
                }

                showToast('Deleted successfully');
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        // New folder
        function showNewFolderModal() {
            document.getElementById('folder-input').value = '';
            document.getElementById('folder-modal').classList.add('show');
            document.getElementById('folder-input').focus();
        }

        async function confirmNewFolder() {
            const name = document.getElementById('folder-input').value.trim();
            if (!name) return;

            try {
                const res = await fetch('/api/files/mkdir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentPath, name })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to create folder');
                }

                closeModals();
                showToast('Folder created');
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        // Upload
        function triggerUpload() {
            document.getElementById('file-input').click();
        }

        async function handleFileSelect(event) {
            const files = event.target.files;
            for (const file of files) {
                await uploadFile(file);
            }
            event.target.value = '';
            loadFiles(currentPath);
            loadTree();
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(currentPath)}`, {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Upload failed');
                }

                showToast(`Uploaded ${file.name}`);
            } catch (err) {
                showToast(err.message, true);
            }
        }

        // Drag and drop (external files only - not internal moves)
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            // Only show drop zone for external file drags, not internal moves
            if (!draggedItem) {
                document.getElementById('drop-zone').classList.add('show');
            }
        });

        document.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null) {
                document.getElementById('drop-zone').classList.remove('show');
            }
        });

        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('show');

            // Only handle file uploads if not an internal drag
            if (!draggedItem && e.dataTransfer.files.length > 0) {
                const files = e.dataTransfer.files;
                for (const file of files) {
                    await uploadFile(file);
                }
                loadFiles(currentPath);
                loadTree();
            }
        });

        // Close modals
        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
        }

        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', (e) => {
                if (e.target === m) closeModals();
            });
        });

        // Enter key for modals
        document.getElementById('rename-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') confirmRename();
            if (e.key === 'Escape') closeModals();
        });

        document.getElementById('folder-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') confirmNewFolder();
            if (e.key === 'Escape') closeModals();
        });

        document.getElementById('edit-textarea').addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModals();
            if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();
                saveFileContent();
            }
        });

        // Toast
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const previewOpen = document.getElementById('preview-panel').classList.contains('show');
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '') + (previewOpen ? ' preview-open' : '');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' && selectedItem) {
                deleteSelected();
            }
            if (e.key === 'F2' && selectedItem) {
                showRenameModal();
            }
            if (e.key === 'Backspace' && !document.querySelector('.modal-overlay.show')) {
                // Go up one level or back to dashboard
                if (currentView === 'browser') {
                    const parts = currentPath.split('/').filter(Boolean);
                    if (parts.length > 0) {
                        parts.pop();
                        showFileBrowser(parts.join('/'));

                        showDashboard();

        // Tree View Icons
        const chevronIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        const treeFolderIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        </svg>`;

        const treeFileIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>`;

        // Tree state
        let treeData = null;
        const expandedPaths = new Set();

        // Hash tracking for smart refresh
        let lastTreeHash = null;
        let lastFilesHash = null;
        let lastRecentFilesHash = null;
        let lastNotesHash = null;

        function hashData(data) {
            return JSON.stringify(data);
        }

        // Initialize sidebar breadcrumbs with project root
        function initBreadcrumbs(projectName) {
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = `<li class="breadcrumb-item">

        // Load tree (initial load)
        async function loadTree() {
            try {
                const res = await fetch('/api/files/tree');
                if (!res.ok) throw new Error('Failed to load tree');
                treeData = await res.json();
                lastTreeHash = hashData(treeData);
                expandedPaths.add(''); // Root is expanded by default
                renderTree();
                // Initialize breadcrumbs with project name
                if (currentView === 'dashboard') {
                    initBreadcrumbs(treeData.name);
                }
            } catch (err) {
                console.error('Failed to load tree:', err);
            }
        }

        // Smart refresh tree (only re-render if changed)
        async function refreshTree() {
            try {
                const res = await fetch('/api/files/tree');
                if (!res.ok) return;
                const newData = await res.json();
                const newHash = hashData(newData);
                if (newHash !== lastTreeHash) {
                    treeData = newData;
                    lastTreeHash = newHash;
                    renderTree();
                }
            } catch (err) {
                // Silent fail on refresh
            }
        }

        // Render tree
        function renderTree() {
            const container = document.getElementById('tree-view');
            container.innerHTML = renderTreeNode(treeData, true);
        }

        function renderTreeNode(node, isRoot = false) {
            if (!node) return '';

            // Filter by search query (but always show root)
            if (!isRoot && treeSearchQuery && !nodeMatchesSearch(node)) {
                return '';
            }

            const isExpanded = expandedPaths.has(node.path);
            const hasChildren = node.is_dir && node.children && node.children.length > 0;
            const isActive = currentPath === node.path;

            let html = '<li>';

            // Check if this is a protected path
            const protectedPaths = ['codebases', 'history', 'notes', 'resources', 'AGENTS.md', 'CLAUDE.md', 'README.md', 'rumdl.toml'];
            const isProtected = protectedPaths.includes(node.path);

            // Tree item
            const canDrag = node.path && !isProtected;
            html += `<div class="tree-item${isActive ? ' active' : ''}"
                         data-path="${node.path}"
                         data-is-dir="${node.is_dir}"
                         ${canDrag ? 'draggable="true"' : ''}
                         ${canDrag ? `ondragstart="handleDragStart(event, '${node.path}', '${node.name}', ${node.is_dir})"` : ''}
                         ondragend="handleDragEnd(event)"
                         ${node.is_dir ? `ondragover="handleDragOver(event, '${node.path}', true)"` : ''}
                         ${node.is_dir ? `ondragleave="handleDragLeave(event)"` : ''}
                         ${node.is_dir ? `ondrop="handleDrop(event, '${node.path}', true)"` : ''}
                         onclick="handleTreeClick(event, '${node.path}', ${node.is_dir}, ${hasChildren})"
                         ondblclick="handleTreeDblClick(event, '${node.path}', ${node.is_dir})">`;

            // Icon
            html += `<span class="tree-icon ${node.is_dir ? 'folder' : 'file'}">
                        ${node.is_dir ? treeFolderIcon : getFileIcon(node.name)}
                     </span>`;

            // Name (highlight search matches)
            let displayName = node.name;
            if (treeSearchQuery && node.name.toLowerCase().includes(treeSearchQuery)) {
                const regex = new RegExp(`(${treeSearchQuery})`, 'gi');
                displayName = node.name.replace(regex, '<mark>$1</mark>');
            }
            html += `<span class="tree-name">${displayName}</span>`;

            // Toggle chevron (on right side for folders)
            html += `<span class="tree-toggle${isExpanded ? ' expanded' : ''}${!hasChildren ? ' hidden' : ''}"
                          onclick="toggleTreeNode(event, '${node.path}')">${chevronIcon}</span>`;

            // Action buttons (only for non-root and non-protected items)
            if (node.path && !isProtected) {
                html += `<span class="tree-actions">
                    <button class="tree-action-btn edit-btn" onclick="event.stopPropagation(); editItem('${node.path}', '${node.name}')" title="Rename">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z" />
                        </svg>
                    </button>
                    <button class="tree-action-btn delete-btn" onclick="event.stopPropagation(); deleteItem('${node.path}', '${node.name}', ${node.is_dir})" title="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                        </svg>
                    </button>
                </span>`;
            }

            html += '</div>';

            // Children
            if (node.is_dir && node.children) {
                const childrenHeight = isExpanded ? 'auto' : '0';
                html += `<ul class="tree-children${isExpanded ? '' : ' collapsed'}" style="max-height: ${childrenHeight}">`;
                for (const child of node.children) {
                    html += renderTreeNode(child);
                }
                html += '</ul>';
            }

            html += '</li>';
            return html;
        }

        // Toggle tree node expansion
        function toggleTreeNode(event, path) {
            event.stopPropagation();

            if (expandedPaths.has(path)) {
                expandedPaths.delete(path);
            } else {
                expandedPaths.add(path);
            }

            renderTree();
        }

        // Tree search/filter
        let treeSearchQuery = '';

        function filterTree(query) {
            treeSearchQuery = query.toLowerCase().trim();
            const clearBtn = document.getElementById('tree-search-clear');
            clearBtn.classList.toggle('visible', !!treeSearchQuery);

            if (treeSearchQuery && treeData) {
                // Expand all folders that contain matches
                expandMatchingPaths(treeData);
            }
            renderTree();
        }

        function clearTreeSearch() {
            document.getElementById('tree-search-input').value = '';
            treeSearchQuery = '';
            document.getElementById('tree-search-clear').classList.remove('visible');
            renderTree();
        }

        function expandMatchingPaths(node) {
            if (!node.children) return false;

            let hasMatch = node.name.toLowerCase().includes(treeSearchQuery);

            for (const child of node.children) {
                if (child.name.toLowerCase().includes(treeSearchQuery)) {
                    hasMatch = true;
                }
                if (child.is_dir && expandMatchingPaths(child)) {
                    hasMatch = true;
                }
            }

            if (hasMatch && node.path) {
                expandedPaths.add(node.path);
            }

            return hasMatch;
        }

        function nodeMatchesSearch(node) {
            if (!treeSearchQuery) return true;

            // Check if this node matches
            if (node.name.toLowerCase().includes(treeSearchQuery)) return true;

            // Check if any children match
            if (node.children) {
                for (const child of node.children) {
                    if (nodeMatchesSearch(child)) return true;
                }
            }

            return false;
        }

        // Handle tree item click
        function handleTreeClick(event, path, isDir, hasChildren) {
            // Don't do anything if clicking on toggle (it handles itself)
            if (event.target.closest('.tree-toggle')) return;

            if (isDir) {
                if (hasChildren) {
                    // Non-empty folder: single click just toggles expand/collapse
                    toggleTreeNode(event, path);
                } else {
                    // Empty folder: single click opens file browser
                    showFileBrowser(path);
                }
            } else {
                // For files, open preview panel
                openFilePreview(path);
                // If already in browser view, navigate to the file's parent folder
                if (currentView === 'browser') {
                    const parentPath = path.split('/').slice(0, -1).join('/');
                    if (parentPath !== currentPath) {
                        showFileBrowser(parentPath);
                    }
                }
            }
        }

        // Handle tree item double click (navigate to file browser for folders, fullscreen preview for files)
        function handleTreeDblClick(event, path, isDir) {
            if (isDir) {
                expandedPaths.add(path);
                showFileBrowser(path);
                renderTree();
            } else {
                // For files, open preview in fullscreen mode
                openFilePreview(path);
                // Small delay to ensure panel is shown before toggling fullscreen
                setTimeout(() => {
                    const panel = document.getElementById('preview-panel');
                    if (panel && !panel.classList.contains('fullscreen')) {
                        togglePreviewFullscreen();
                    }
                }, 50);
            }
        }

        // Update tree active state when path changes
        function updateTreeActiveState() {
            document.querySelectorAll('.tree-item').forEach(item => {
                if (item.dataset.path === currentPath) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // View state
        let currentView = 'dashboard'; // 'dashboard' or 'browser'

        function showDashboard() {
            currentView = 'dashboard';
            document.getElementById('dashboard').style.display = 'grid';
            document.getElementById('content').style.display = 'none';
            currentPath = '';
            // Reset navigation state when returning to dashboard
            forwardHistory = [];
            lastFullPath = '';
            updateTreeActiveState();
            // Reset breadcrumbs to show project root
            if (treeData) {
                initBreadcrumbs(treeData.name);
            }
        }

        function showFileBrowser(path) {
            currentView = 'browser';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            // Reset navigation state when entering file browser
            forwardHistory = [];
            lastFullPath = path;
            loadFiles(path);
        }

        // Dashboard initialization
        async function initDashboard() {
            await Promise.all([
                loadRecentFiles(),
                loadNotesPreview(),
                initGraph()
            ]);
        }

        // Load recent files
        async function loadRecentFiles() {
            const container = document.getElementById('recent-files');
            try {
                const res = await fetch('/api/stats');
                if (!res.ok) throw new Error('Failed to load stats');
                const data = await res.json();
                lastRecentFilesHash = hashData(data.recent_files);

                if (!data.recent_files || data.recent_files.length === 0) {
                    container.innerHTML = '<p class="empty-message">No recent files</p>';
                    return;
                }

                const filteredFiles = data.recent_files.filter(f => f.name !== '.gitkeep');
                container.innerHTML = `<ul class="file-list">${filteredFiles.slice(0, 10).map(f => `
                    <li class="file-list-item" onclick="openFilePreview('${f.path}')" ondblclick="openItem('${f.path}', false)">
                        <div class="file-icon">${getFileIcon(f.name)}</div>
                        <div class="file-info">
                            <div class="name">${f.name}</div>
                            <div class="meta">${f.modified_ago} &bull; ${f.type}</div>
                        </div>
                    </li>
                `).join('')}</ul>`;
            } catch (err) {
                container.innerHTML = '<p class="empty-message">Failed to load recent files</p>';
            }
        }

        // Smart refresh recent files
        async function refreshRecentFiles() {
            try {
                const res = await fetch('/api/stats');
                if (!res.ok) return;
                const data = await res.json();
                const newHash = hashData(data.recent_files);
                if (newHash !== lastRecentFilesHash) {
                    lastRecentFilesHash = newHash;
                    const container = document.getElementById('recent-files');
                    const filteredFiles = data.recent_files.filter(f => f.name !== '.gitkeep');
                    if (!filteredFiles || filteredFiles.length === 0) {
                        container.innerHTML = '<p class="empty-message">No recent files</p>';
                        return;
                    }
                    container.innerHTML = `<ul class="file-list">${filteredFiles.slice(0, 10).map(f => `
                        <li class="file-list-item" onclick="openFilePreview('${f.path}')" ondblclick="openItem('${f.path}', false)">
                            <div class="file-icon">${getFileIcon(f.name)}</div>
                            <div class="file-info">
                                <div class="name">${f.name}</div>
                                <div class="meta">${f.modified_ago} &bull; ${f.type}</div>
                            </div>
                        </li>
                    `).join('')}</ul>`;
                }
            } catch (err) {
                // Silent fail
            }
        }

        // Load notes preview
        async function loadNotesPreview() {
            const container = document.getElementById('notes-preview');
            try {
                const res = await fetch('/api/notes');
                if (!res.ok) throw new Error('Failed to load notes');
                const notes = await res.json();
                lastNotesHash = hashData(notes);

                if (!notes || notes.length === 0) {
                    container.innerHTML = '<p class="empty-message">No notes yet</p>';

                container.innerHTML = notes.slice(0, 5).map(note => `

                    </div>

                container.innerHTML = '<p class="empty-message">Failed to load notes</p>';
