        // Delete item directly (from button)
        async function deleteItem(path, name, isDir) {
            if (!confirm(`Delete "${name}"?`)) return;

            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(path)}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to delete');
                }

                showToast('Deleted successfully');
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        // Move item (drag and drop)
        const protectedPaths = ['codebases', 'history', 'notes', 'resources', 'AGENTS.md', 'CLAUDE.md', 'README.md', 'rumdl.toml'];
        let draggedItem = null;

        function isProtectedPath(path) {
            return protectedPaths.includes(path);
        }

        function handleDragStart(event, path, name, isDir) {
            if (isProtectedPath(path)) {
                event.preventDefault();
                return;
            }
            draggedItem = { path, name, isDir };
            event.target.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', path);
        }

        function handleDragEnd(event) {
            event.target.classList.remove('dragging');
            document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over', 'invalid'));
            draggedItem = null;
        }

        function handleDragOver(event, targetPath, targetIsDir) {
            event.preventDefault();
            if (!draggedItem || !targetIsDir) return;

            // Can't drop onto itself
            if (draggedItem.path === targetPath) return;
            // Can't drop into the folder it's already in
            const currentParent = draggedItem.path.split('/').slice(0, -1).join('/');
            if (currentParent === targetPath) return;
            // Can't drop a folder into itself or its descendants
            if (draggedItem.isDir && (targetPath === draggedItem.path || targetPath.startsWith(draggedItem.path + '/'))) return;

            event.dataTransfer.dropEffect = 'move';
            event.target.closest('.tree-item, .file-item')?.classList.add('drag-over');
        }

        function handleDragLeave(event) {
            event.target.closest('.tree-item, .file-item')?.classList.remove('drag-over', 'invalid');
        }

        async function handleDrop(event, targetPath, targetIsDir) {
            event.preventDefault();
            event.target.closest('.tree-item, .file-item')?.classList.remove('drag-over', 'invalid');

            if (!draggedItem || !targetIsDir) return;
            // Can't drop onto itself
            if (draggedItem.path === targetPath) return;
            // Can't drop into the folder it's already in
            const currentParent = draggedItem.path.split('/').slice(0, -1).join('/');
            if (currentParent === targetPath) return;
            // Can't drop a folder into itself or its descendants
            if (draggedItem.isDir && (targetPath === draggedItem.path || targetPath.startsWith(draggedItem.path + '/'))) return;

            // Save item data before async operation (draggedItem gets nulled by handleDragEnd)
            const itemPath = draggedItem.path;
            const itemName = draggedItem.name;

            try {
                const res = await fetch('/api/files/move', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source_path: itemPath,
                        target_folder: targetPath
                    })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to move');
                }

                showToast(`Moved "${itemName}" to ${targetPath || 'root'}`);
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }
        }

        async function confirmRename() {
            const newName = document.getElementById('rename-input').value.trim();
            if (!newName || !selectedItem) return;

            try {
                const res = await fetch('/api/files/rename', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_path: selectedItem.path, new_name: newName })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to rename');
                }

                closeModals();
                showToast('Renamed successfully');
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }
        }

            if (!selectedItem) return;
            if (!confirm(`Delete "${selectedItem.name}"?`)) return;

            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(selectedItem.path)}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to delete');
                }

                showToast('Deleted successfully');
                loadFiles(currentPath);
                loadTree();
            } catch (err) {
                showToast(err.message, true);
            }

            const name = document.getElementById('folder-input').value.trim();

            try {
                const res = await fetch('/api/files/mkdir', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentPath, name })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Failed to create folder');
                }

                closeModals();
                showToast('Folder created');
                loadFiles(currentPath);
                loadTree();

                showToast(err.message, true);
            }

        // Upload
        function triggerUpload() {
            document.getElementById('file-input').click();
        }

        async function handleFileSelect(event) {
            const files = event.target.files;
            for (const file of files) {
                await uploadFile(file);
            }
            event.target.value = '';
            loadFiles(currentPath);
            loadTree();
        }

        async function uploadFile(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`/api/files?path=${encodeURIComponent(currentPath)}`, {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Upload failed');
                }

                showToast(`Uploaded ${file.name}`);
            } catch (err) {
                showToast(err.message, true);
            }
        }

        // Drag and drop (external files only - not internal moves)
        document.addEventListener('dragover', (e) => {

            // Only show drop zone for external file drags, not internal moves

                document.getElementById('drop-zone').classList.add('show');

        document.addEventListener('dragleave', (e) => {
            if (e.relatedTarget === null) {
                document.getElementById('drop-zone').classList.remove('show');
            }

        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('show');

            // Only handle file uploads if not an internal drag

                const files = e.dataTransfer.files;

        // Close modals
        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));

        document.querySelectorAll('.modal-overlay').forEach(m => {
            m.addEventListener('click', (e) => {
                if (e.target === m) closeModals();
            });
        });

        // Enter key for modals

            if (e.key === 'Enter') confirmRename();
            if (e.key === 'Escape') closeModals();
        });

            if (e.key === 'Enter') confirmNewFolder();

        document.getElementById('edit-textarea').addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModals();
            if (e.key === 's' && (e.ctrlKey || e.metaKey)) {
                e.preventDefault();

        // Toast
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const previewOpen = document.getElementById('preview-panel').classList.contains('show');
            toast.textContent = message;

            setTimeout(() => toast.classList.remove('show'), 3000);

                        showDashboard();

        // Tree View Icons
        const chevronIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">

        const treeFolderIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.75V12A2.25 2.25 0 014.5 9.75h15A2.25 2.25 0 0121.75 12v.75m-8.69-6.44l-2.12-2.12a1.5 1.5 0 00-1.061-.44H4.5A2.25 2.25 0 002.25 6v12a2.25 2.25 0 002.25 2.25h15A2.25 2.25 0 0021.75 18V9a2.25 2.25 0 00-2.25-2.25h-5.379a1.5 1.5 0 01-1.06-.44z" />
        </svg>`;

        const treeFileIcon = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z" />
        </svg>`;

        // Tree state
        let treeData = null;
        const expandedPaths = new Set();

        // Hash tracking for smart refresh
        let lastTreeHash = null;
        let lastFilesHash = null;
        let lastRecentFilesHash = null;
        let lastNotesHash = null;

        function hashData(data) {
            return JSON.stringify(data);
        }

        // Initialize sidebar breadcrumbs with project root
        function initBreadcrumbs(projectName) {
            const container = document.getElementById('breadcrumbs');
            container.innerHTML = `<li class="breadcrumb-item">
                <button class="breadcrumb-link" onclick="showDashboard()" title="Back to Dashboard" style="display:flex;align-items:center;gap:6px;">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:14px;height:14px;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
                    </svg>
                    ${projectName}
                </button>
            </li>`;
        }

        // Load tree (initial load)
        async function loadTree() {
            try {
                const res = await fetch('/api/files/tree');
                if (!res.ok) throw new Error('Failed to load tree');
                treeData = await res.json();
                lastTreeHash = hashData(treeData);
                expandedPaths.add(''); // Root is expanded by default
                renderTree();
                // Initialize breadcrumbs with project name
                if (currentView === 'dashboard') {
                    initBreadcrumbs(treeData.name);
                }
            } catch (err) {
                console.error('Failed to load tree:', err);
            }
        }

        // Smart refresh tree (only re-render if changed)
        async function refreshTree() {
            try {
                const res = await fetch('/api/files/tree');
                if (!res.ok) return;
                const newData = await res.json();
                const newHash = hashData(newData);
                if (newHash !== lastTreeHash) {
                    treeData = newData;
                    lastTreeHash = newHash;
                    renderTree();
                }
            } catch (err) {
                // Silent fail on refresh
            }
        }

        // Render tree
        function renderTree() {
            const container = document.getElementById('tree-view');
            container.innerHTML = renderTreeNode(treeData, true);
        }

        function renderTreeNode(node, isRoot = false) {
            if (!node) return '';

            // Filter by search query (but always show root)
            if (!isRoot && treeSearchQuery && !nodeMatchesSearch(node)) {
                return '';
            }

            const isExpanded = expandedPaths.has(node.path);
            const hasChildren = node.is_dir && node.children && node.children.length > 0;
            const isActive = currentPath === node.path;

            let html = '<li>';

            // Check if this is a protected path
            const protectedPaths = ['codebases', 'history', 'notes', 'resources', 'AGENTS.md', 'CLAUDE.md', 'README.md', 'rumdl.toml'];
            const isProtected = protectedPaths.includes(node.path);

            // Tree item
            const canDrag = node.path && !isProtected;
            html += `<div class="tree-item${isActive ? ' active' : ''}"
                         data-path="${node.path}"
                         data-is-dir="${node.is_dir}"
                         ${canDrag ? 'draggable="true"' : ''}
                         ${canDrag ? `ondragstart="handleDragStart(event, '${node.path}', '${node.name}', ${node.is_dir})"` : ''}
                         ondragend="handleDragEnd(event)"
                         ${node.is_dir ? `ondragover="handleDragOver(event, '${node.path}', true)"` : ''}
                         ${node.is_dir ? `ondragleave="handleDragLeave(event)"` : ''}
                         ${node.is_dir ? `ondrop="handleDrop(event, '${node.path}', true)"` : ''}
                         onclick="handleTreeClick(event, '${node.path}', ${node.is_dir}, ${hasChildren})"
                         ondblclick="handleTreeDblClick(event, '${node.path}', ${node.is_dir})">`;

            // Icon
            html += `<span class="tree-icon ${node.is_dir ? 'folder' : 'file'}">
                        ${node.is_dir ? treeFolderIcon : getFileIcon(node.name)}
                     </span>`;

            // Name (highlight search matches)
            let displayName = node.name;
            if (treeSearchQuery && node.name.toLowerCase().includes(treeSearchQuery)) {
                const regex = new RegExp(`(${treeSearchQuery})`, 'gi');
                displayName = node.name.replace(regex, '<mark>$1</mark>');
            }
            html += `<span class="tree-name">${displayName}</span>`;

            // Toggle chevron (on right side for folders)
            html += `<span class="tree-toggle${isExpanded ? ' expanded' : ''}${!hasChildren ? ' hidden' : ''}"
                          onclick="toggleTreeNode(event, '${node.path}')">${chevronIcon}</span>`;

            // Action buttons (only for non-root and non-protected items)
            if (node.path && !isProtected) {
                html += `<span class="tree-actions">
                    <button class="tree-action-btn edit-btn" onclick="event.stopPropagation(); editItem('${node.path}', '${node.name}')" title="Rename">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931z" />
                        </svg>
                    </button>
                    <button class="tree-action-btn delete-btn" onclick="event.stopPropagation(); deleteItem('${node.path}', '${node.name}', ${node.is_dir})" title="Delete">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0" />
                        </svg>
                    </button>
                </span>`;
            }

            html += '</div>';

            // Children
            if (node.is_dir && node.children) {
                const childrenHeight = isExpanded ? 'auto' : '0';
                html += `<ul class="tree-children${isExpanded ? '' : ' collapsed'}" style="max-height: ${childrenHeight}">`;
                for (const child of node.children) {
                    html += renderTreeNode(child);
                }
                html += '</ul>';
            }

            html += '</li>';
            return html;
        }

        // Toggle tree node expansion
        function toggleTreeNode(event, path) {
            event.stopPropagation();

            if (expandedPaths.has(path)) {
                expandedPaths.delete(path);
            } else {
                expandedPaths.add(path);
            }

            renderTree();
        }

        // Tree search/filter
        let treeSearchQuery = '';

        function filterTree(query) {
            treeSearchQuery = query.toLowerCase().trim();
            const clearBtn = document.getElementById('tree-search-clear');
            clearBtn.classList.toggle('visible', !!treeSearchQuery);

            if (treeSearchQuery && treeData) {
                // Expand all folders that contain matches
                expandMatchingPaths(treeData);
            }
            renderTree();
        }

        function clearTreeSearch() {
            document.getElementById('tree-search-input').value = '';
            treeSearchQuery = '';
            document.getElementById('tree-search-clear').classList.remove('visible');
            renderTree();
        }

        function expandMatchingPaths(node) {
            if (!node.children) return false;

            let hasMatch = node.name.toLowerCase().includes(treeSearchQuery);

            for (const child of node.children) {
                if (child.name.toLowerCase().includes(treeSearchQuery)) {
                    hasMatch = true;
                }
                if (child.is_dir && expandMatchingPaths(child)) {
                    hasMatch = true;
                }
            }

            if (hasMatch && node.path) {
                expandedPaths.add(node.path);
            }

            return hasMatch;
        }

        function nodeMatchesSearch(node) {
            if (!treeSearchQuery) return true;

            // Check if this node matches
            if (node.name.toLowerCase().includes(treeSearchQuery)) return true;

            // Check if any children match
            if (node.children) {
                for (const child of node.children) {
                    if (nodeMatchesSearch(child)) return true;
                }
            }

            return false;
        }

        // Handle tree item click
        function handleTreeClick(event, path, isDir, hasChildren) {
            // Don't do anything if clicking on toggle (it handles itself)
            if (event.target.closest('.tree-toggle')) return;

            if (isDir) {
                if (hasChildren) {
                    // Non-empty folder: single click just toggles expand/collapse
                    toggleTreeNode(event, path);
                } else {
                    // Empty folder: single click opens file browser
                    showFileBrowser(path);
                }
            } else {
                // For files, open preview panel
                openFilePreview(path);
                // If already in browser view, navigate to the file's parent folder
                if (currentView === 'browser') {
                    const parentPath = path.split('/').slice(0, -1).join('/');
                    if (parentPath !== currentPath) {
                        showFileBrowser(parentPath);
                    }
                }
            }
        }

        // Handle tree item double click (navigate to file browser for folders)
        function handleTreeDblClick(event, path, isDir) {
            if (isDir) {
                expandedPaths.add(path);
                showFileBrowser(path);
                renderTree();
            }
        }

        // Update tree active state when path changes
        function updateTreeActiveState() {
            document.querySelectorAll('.tree-item').forEach(item => {
                if (item.dataset.path === currentPath) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // View state
        let currentView = 'dashboard'; // 'dashboard' or 'browser'

        function showDashboard() {
            currentView = 'dashboard';
            document.getElementById('dashboard').style.display = 'grid';
            document.getElementById('content').style.display = 'none';
            currentPath = '';
            // Reset navigation state when returning to dashboard
            forwardHistory = [];
            lastFullPath = '';
            updateTreeActiveState();
            // Reset breadcrumbs to show project root
            if (treeData) {
                initBreadcrumbs(treeData.name);
            }
        }

        function showFileBrowser(path) {
            currentView = 'browser';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            // Reset navigation state when entering file browser
            forwardHistory = [];
            lastFullPath = path;
            loadFiles(path);
        }

        // Dashboard initialization
        async function initDashboard() {
            await Promise.all([
                loadRecentFiles(),
                loadNotesPreview(),
                initGraph()
            ]);
        }

        // Load recent files
        async function loadRecentFiles() {
            const container = document.getElementById('recent-files');
            try {
                const res = await fetch('/api/stats');
                if (!res.ok) throw new Error('Failed to load stats');
                const data = await res.json();
                lastRecentFilesHash = hashData(data.recent_files);

                if (!data.recent_files || data.recent_files.length === 0) {
                    container.innerHTML = '<p class="empty-message">No recent files</p>';
                    return;
                }

                const filteredFiles = data.recent_files.filter(f => f.name !== '.gitkeep');
                container.innerHTML = `<ul class="file-list">${filteredFiles.slice(0, 10).map(f => `
                    <li class="file-list-item" onclick="openFilePreview('${f.path}')">
                        <div class="file-icon">${getFileIcon(f.name)}</div>
                        <div class="file-info">
                            <div class="name">${f.name}</div>
                            <div class="meta">${f.modified_ago} &bull; ${f.type}</div>
                        </div>
                    </li>
                `).join('')}</ul>`;

                container.innerHTML = '<p class="empty-message">Failed to load recent files</p>';
            }
        }

        // Smart refresh recent files
        async function refreshRecentFiles() {
            try {
                const res = await fetch('/api/stats');
                if (!res.ok) return;
                const data = await res.json();
                const newHash = hashData(data.recent_files);
                if (newHash !== lastRecentFilesHash) {
                    lastRecentFilesHash = newHash;
                    const container = document.getElementById('recent-files');

                            <div class="file-info">

                                <div class="meta">${f.modified_ago} &bull; ${f.type}</div>

        // Load notes preview
        async function loadNotesPreview() {
            const container = document.getElementById('notes-preview');
            try {
                const res = await fetch('/api/notes');
                if (!res.ok) throw new Error('Failed to load notes');
                const notes = await res.json();
                lastNotesHash = hashData(notes);

                if (!notes || notes.length === 0) {
                    container.innerHTML = '<p class="empty-message">No notes yet</p>';

                }

        // Smart refresh notes preview
        async function refreshNotesPreview() {
            try {
                const res = await fetch('/api/notes');
                if (!res.ok) return;
                const notes = await res.json();
                const newHash = hashData(notes);
                if (newHash !== lastNotesHash) {
                    lastNotesHash = newHash;
                    const container = document.getElementById('notes-preview');
                    if (!notes || notes.length === 0) {
                        container.innerHTML = '<p class="empty-message">No notes yet</p>';
                        return;
                    }
                    container.innerHTML = notes.slice(0, 5).map(note => `
                        <div class="note-item" onclick="openFilePreview('notes/${note.filename}')" style="cursor: pointer;">
                            <h4>${note.title}</h4>
                            <p class="preview">${note.preview || ''}</p>
                            <div class="meta">${note.modified_ago}</div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                // Silent fail
            }
        }

        // Directory color mapping for graph - modern pastel palette
        const dirColors = {
            resources: '#60a5fa',  // Blue
            codebases: '#a855f7',  // Deep purple
            history: '#f87171',    // Red
            notes: '#fbbf24',      // Yellow (sticky note)
            other: '#94a3b8'       // Slate gray
        };

        // Track graph data to detect changes
        let lastGraphHash = null;

        function hashGraphData(data) {
            // Simple hash based on node/edge counts and IDs
            const nodeIds = data.nodes.map(n => n.id).sort().join(',');
            const edgeIds = data.edges.map(e => `${e.source}-${e.target}`).sort().join(',');
            return `${data.nodes.length}:${data.edges.length}:${nodeIds}:${edgeIds}`;
        }

        // Initialize and render graph
        async function initGraph() {
            try {
                const response = await fetch('/api/graph');
                const data = await response.json();
                renderGraph(data);
                lastGraphHash = hashGraphData(data);
            } catch (error) {
                console.error('Failed to load graph:', error);
                document.getElementById('graph-stats').textContent = 'Failed to load graph';
            }
        }

        // Refresh graph only if data changed
        async function refreshGraph() {
            try {
                const response = await fetch('/api/graph');
                const data = await response.json();
                const newHash = hashGraphData(data);
                if (newHash !== lastGraphHash) {
                    renderGraph(data);
                    lastGraphHash = newHash;
                }
            } catch (error) {
                console.error('Failed to refresh graph:', error);
            }
        }

        function renderGraph(data) {
            // Store data for re-rendering on resize/fullscreen
            window.lastGraphData = data;

            const container = document.querySelector('.graph-container');
            const svg = d3.select('#graph-svg');
            const tooltip = document.getElementById('graph-tooltip');
            const statsEl = document.getElementById('graph-stats');

            svg.selectAll('*').remove();

            const width = container.clientWidth;
            const height = container.clientHeight;

            svg.attr('width', width).attr('height', height);

            if (data.nodes.length === 0) {
                statsEl.textContent = 'No files found';
                return;
            }

            const nodeMap = new Map(data.nodes.map(n => [n.id, n]));
            let links = data.edges.map(e => ({
                source: e.source,
                target: e.target,
                link_text: e.link_text
            })).filter(e => nodeMap.has(e.source) && nodeMap.has(e.target));

            // Add custom links from localStorage
            const existingLinks = new Set(links.map(l => `${l.source}-${l.target}`));
            for (const cl of customLinks) {
                if (nodeMap.has(cl.source) && nodeMap.has(cl.target)) {
                    const key = `${cl.source}-${cl.target}`;
                    const reverseKey = `${cl.target}-${cl.source}`;
                    if (!existingLinks.has(key) && !existingLinks.has(reverseKey)) {
                        existingLinks.add(key);
                        links.push({
                            source: cl.source,
                            target: cl.target,
                            link_text: cl.link_text || 'custom link',
                            isCustom: true
                        });
                    }
                }
            }

            // Build set of linked node IDs and link map (before any filtering)
            const linkedNodeIds = new Set();
            const linkMap = new Map(); // nodeId -> Set of connected nodeIds
            links.forEach(l => {
                const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                linkedNodeIds.add(sourceId);
                linkedNodeIds.add(targetId);
                if (!linkMap.has(sourceId)) linkMap.set(sourceId, new Set());
                if (!linkMap.has(targetId)) linkMap.set(targetId, new Set());
                linkMap.get(sourceId).add(targetId);
                linkMap.get(targetId).add(sourceId);
            });

            // Apply directory filter - identify primary nodes
            let primaryNodeIds = new Set();
            let filteredNodes = data.nodes;
            if (activeDirectoryFilters.size > 0) {
                filteredNodes = data.nodes.filter(n => activeDirectoryFilters.has(n.directory));
                primaryNodeIds = new Set(filteredNodes.map(n => n.id));
            }

            // Apply connection filter
            if (connectionFilter === 'linked') {
                filteredNodes = filteredNodes.filter(n => linkedNodeIds.has(n.id));

                // If directory filter is active, also include connected nodes from other directories (as secondary)
                if (activeDirectoryFilters.size > 0) {
                    const secondaryNodeIds = new Set();
                    filteredNodes.forEach(n => {
                        const connected = linkMap.get(n.id);
                        if (connected) {
                            connected.forEach(connectedId => {
                                if (!primaryNodeIds.has(connectedId)) {
                                    secondaryNodeIds.add(connectedId);
                                }
                            });
                        }
                    });
                    // Add secondary nodes
                    data.nodes.forEach(n => {
                        if (secondaryNodeIds.has(n.id)) {
                            filteredNodes.push({...n, isSecondary: true});
                        }
                    });
                }
            } else if (connectionFilter === 'unlinked') {
                filteredNodes = filteredNodes.filter(n => !linkedNodeIds.has(n.id));
            }

            const filteredNodeIds = new Set(filteredNodes.map(n => n.id));
            const secondaryNodeIds = new Set(filteredNodes.filter(n => n.isSecondary).map(n => n.id));

            // Filter links to only include those between visible nodes
            // Mark links as secondary if they connect to a secondary node
            links = links.filter(l => {
                const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                return filteredNodeIds.has(sourceId) && filteredNodeIds.has(targetId);
            }).map(l => {
                const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                return {
                    ...l,
                    isSecondary: secondaryNodeIds.has(sourceId) || secondaryNodeIds.has(targetId)
                };
            });

            const nodes = filteredNodes.map(n => ({...n}));

            statsEl.textContent = `${nodes.length} files, ${links.length} links`;

            // Create a group for zoom/pan
            const g = svg.append('g');

            // Add zoom behavior
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);

            // Store references for external zoom control
            window.graphZoom = zoom;
            window.graphSvg = svg;

            // Add double-click to reset zoom
            svg.on('dblclick.zoom', () => {
                svg.transition().duration(300).call(zoom.transform, d3.zoomIdentity);
            });

            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(80))
                .force('charge', d3.forceManyBody().strength(-25))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(12));

            // Soft shadow for polished look
            const defs = g.append('defs');
            const filter = defs.append('filter')
                .attr('id', 'node-glow')
                .attr('x', '-100%')
                .attr('y', '-100%')
                .attr('width', '300%')
                .attr('height', '300%');
            filter.append('feDropShadow')
                .attr('dx', '0')
                .attr('dy', '1')
                .attr('stdDeviation', '2.5')
                .attr('flood-color', 'rgba(0,0,0,0.18)');

            const link = g.append('g')
                .attr('class', 'links')
                .selectAll('line')
                .data(links)
                .join('line')
                .attr('class', d => 'graph-link' + (deleteMode ? ' graph-link-deletable' : ''))
                .attr('stroke', '#cbd5e1')
                .attr('stroke-width', 1.5)
                .attr('opacity', d => d.isSecondary ? 0.35 : 1)
                .on('mouseover', function(event, d) {
                    if (deleteMode) {
                        d3.select(this).attr('stroke', '#ef4444').attr('stroke-width', 3);
                    } else {
                        d3.select(this).attr('stroke', '#3EB489').attr('stroke-width', 2.5);
                    }
                    tooltip.innerHTML = `${d.source.name || d.source} → ${d.target.name || d.target}${d.isCustom ? ' (custom)' : ''}`;
                    tooltip.style.left = event.clientX + 12 + 'px';
                    tooltip.style.top = event.clientY + 12 + 'px';
                    tooltip.classList.add('visible');
                })
                .on('mouseout', function() {
                    d3.select(this).attr('stroke', '#cbd5e1').attr('stroke-width', 1.5);
                    tooltip.classList.remove('visible');
                })
                .on('click', function(event, d) {
                    handleLinkClickForDeletion(event, d);
                });

            const node = g.append('g')
                .attr('class', 'nodes')
                .selectAll('g')
                .data(nodes)
                .join('g')
                .attr('class', d => 'graph-node' + (selectedSourceNode && d.id === selectedSourceNode.id ? ' graph-node-selected' : ''))
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended))
                .on('mouseover', function(event, d) {
                    if (linkMode) {
                        d3.select(this).select('circle').attr('stroke', '#3EB489').attr('stroke-width', 2);
                    }
                    // Highlight connected links in golden
                    link.each(function(l) {
                        const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                        const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                        if (sourceId === d.id || targetId === d.id) {
                            d3.select(this).attr('stroke', '#3EB489').attr('stroke-width', 2.5);
                        }
                    });
                    tooltip.textContent = d.name;
                    tooltip.style.left = event.clientX + 12 + 'px';
                    tooltip.style.top = event.clientY + 12 + 'px';
                    tooltip.classList.add('visible');
                })
                .on('mouseout', function(d) {
                    if (linkMode && !(selectedSourceNode && d3.select(this).datum().id === selectedSourceNode.id)) {
                        d3.select(this).select('circle').attr('stroke', null).attr('stroke-width', null);
                    }
                    // Reset link colors (preserve opacity for secondary links)
                    link.attr('stroke', '#cbd5e1').attr('stroke-width', 1.5)
                        .attr('opacity', l => l.isSecondary ? 0.35 : 1);
                    tooltip.classList.remove('visible');
                })
                .on('click', function(event, d) {
                    if (linkMode) {
                        handleNodeClickForLinking(event, d);
                    } else if (!deleteMode) {
                        event.stopPropagation();
                        openFilePreview(d.id);
                    }
                });

            node.append('circle')
                .attr('r', 9)
                .attr('fill', d => dirColors[d.directory] || dirColors.other)
                .attr('opacity', d => d.isSecondary ? 0.35 : 1)
                .attr('filter', 'url(#node-glow)');

            node.append('text')
                .attr('dx', 14)
                .attr('dy', 4)
                .attr('opacity', d => d.isSecondary ? 0.4 : 1)
                .text(d => d.name.length > 20 ? d.name.slice(0, 17) + '...' : d.name);

            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });

            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
        }

        // Re-render graph on window resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            if (currentView === 'dashboard') {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(initGraph, 250);
            }
        });

        // Initial load
        loadTree();
    </script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // Auto-refresh with smart change detection (only re-renders if data changed)
        let refreshInterval = null;
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                // Smart refresh tree (only re-renders if changed)
                refreshTree();
                if (currentView === 'dashboard') {
                    refreshRecentFiles();
                    refreshNotesPreview();
                    refreshGraph();
                } else if (currentView === 'browser') {
                    refreshFiles();
                }
            }, 3000);
        }

        // Initialize dashboard after D3 is ready
        function tryInitDashboard() {
            if (typeof d3 !== 'undefined') {
                // Load each panel independently so one failure doesn't block others
                loadRecentFiles();
                loadNotesPreview();
                initGraph();
                startAutoRefresh();
            } else {
                // D3 not ready yet, retry
                setTimeout(tryInitDashboard, 100);
            }
        }

        // Graph link editing state
        let linkMode = false;
        let deleteMode = false;
        let selectedSourceNode = null;
        let customLinks = JSON.parse(localStorage.getItem('santai-custom-links') || '[]');

        // Graph filter state
        let activeDirectoryFilters = new Set(); // Empty means show all
        let connectionFilter = 'all'; // 'all', 'linked', 'unlinked'

        function toggleDirectoryFilter(directory) {
            const item = document.querySelector(`.graph-legend-item[data-directory="${directory}"]`);
            if (activeDirectoryFilters.has(directory)) {
                activeDirectoryFilters.delete(directory);
                item?.classList.remove('active');
            } else {
                activeDirectoryFilters.add(directory);
                item?.classList.add('active');
            }
            // Update dimmed states
            document.querySelectorAll('.graph-legend-item').forEach(el => {
                const dir = el.dataset.directory;
                if (activeDirectoryFilters.size > 0 && !activeDirectoryFilters.has(dir)) {
                    el.classList.add('dimmed');
                } else {
                    el.classList.remove('dimmed');
                }
            });
            // Re-render graph with filters
            if (window.lastGraphData) {
                renderGraph(window.lastGraphData);
            }
        }

        function setConnectionFilter(filter) {
            connectionFilter = filter;
            document.querySelectorAll('.graph-filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            if (window.lastGraphData) {
                renderGraph(window.lastGraphData);
            }
        }

        function toggleLinkMode() {
            linkMode = !linkMode;
            if (linkMode) {
                deleteMode = false;
                document.getElementById('delete-mode-btn').classList.remove('active');
            }
            document.getElementById('link-mode-btn').classList.toggle('active', linkMode);
            selectedSourceNode = null;
            updateEditStatus();
            updateGraphInteraction();
        }

        function toggleDeleteMode() {
            deleteMode = !deleteMode;
            if (deleteMode) {
                linkMode = false;
                document.getElementById('link-mode-btn').classList.remove('active');
                selectedSourceNode = null;
            }
            document.getElementById('delete-mode-btn').classList.toggle('active', deleteMode);
            updateEditStatus();
            updateGraphInteraction();
        }

        function updateEditStatus() {
            const status = document.getElementById('graph-edit-status');
            if (linkMode) {
                if (selectedSourceNode) {
                    status.textContent = `Click another node to link from "${selectedSourceNode.name}"`;
                } else {
                    status.textContent = 'Click a node to start linking';
                }
            } else if (deleteMode) {
                status.textContent = 'Click a link to delete it';
            } else {
                status.textContent = '';
            }
        }

        function updateGraphInteraction() {
            const svg = d3.select('#graph-svg');

            // Update node selection styling
            svg.selectAll('.graph-node').classed('graph-node-selected', d => selectedSourceNode && d.id === selectedSourceNode.id);

            // Update link styling for delete mode
            svg.selectAll('.graph-link').classed('graph-link-deletable', deleteMode);
        }

        function handleNodeClickForLinking(event, d) {
            if (!linkMode) return;

            event.stopPropagation();

            if (!selectedSourceNode) {
                selectedSourceNode = d;
                updateEditStatus();
                updateGraphInteraction();
            } else if (selectedSourceNode.id !== d.id) {
                // Create the link
                createCustomLink(selectedSourceNode.id, d.id);
                selectedSourceNode = null;
                updateEditStatus();
                updateGraphInteraction();
            }
        }

        function createCustomLink(sourceId, targetId) {
            // Check if link already exists
            const exists = customLinks.some(l =>
                (l.source === sourceId && l.target === targetId) ||
                (l.source === targetId && l.target === sourceId)
            );

            if (exists) {
                showToast('Link already exists', true);
                return;
            }

            customLinks.push({ source: sourceId, target: targetId, link_text: 'custom link' });
            localStorage.setItem('santai-custom-links', JSON.stringify(customLinks));

            // Re-render graph with new link
            if (window.lastGraphData) {
                renderGraph(window.lastGraphData);
            }
            showToast('Link created');
        }

        function handleLinkClickForDeletion(event, d) {
            if (!deleteMode) return;

            event.stopPropagation();

            // Hide tooltip since the link will be removed
            document.getElementById('graph-tooltip').classList.remove('visible');

            // Find and remove the link
            const sourceId = d.source.id || d.source;
            const targetId = d.target.id || d.target;

            // Check if it's a custom link
            const customIndex = customLinks.findIndex(l =>
                (l.source === sourceId && l.target === targetId) ||
                (l.source === targetId && l.target === sourceId)
            );

            if (customIndex !== -1) {
                customLinks.splice(customIndex, 1);
                localStorage.setItem('santai-custom-links', JSON.stringify(customLinks));

                if (window.lastGraphData) {
                    renderGraph(window.lastGraphData);
                }
                showToast('Link deleted');
            } else {
                showToast('Cannot delete file-based links', true);
            }
        }

        function zoomGraph(factor) {
            if (!window.graphZoom || !window.graphSvg) return;
            window.graphSvg.transition().duration(200).call(
                window.graphZoom.scaleBy, factor
            );
        }

        function resetGraphView() {
            if (!window.graphZoom || !window.graphSvg) return;
            window.graphSvg.transition().duration(300).call(
                window.graphZoom.transform, d3.zoomIdentity
            );
        }

        async function manualRefreshGraph() {
            try {
                const res = await fetch('/api/graph');
                if (!res.ok) throw new Error('Failed to load graph');
                const data = await res.json();
                window.lastGraphData = data;
                lastGraphHash = hashGraphData(data);
                renderGraph(data);
                showToast('Graph refreshed');
            } catch (err) {
                showToast('Failed to refresh graph', true);
            }
        }

        function toggleGraphFullscreen() {
            const panel = document.querySelector('.graph-panel');
            const expandIcon = document.getElementById('fullscreen-icon-expand');
            const collapseIcon = document.getElementById('fullscreen-icon-collapse');

            panel.classList.toggle('fullscreen');
            const isFullscreen = panel.classList.contains('fullscreen');

            expandIcon.style.display = isFullscreen ? 'none' : 'block';
            collapseIcon.style.display = isFullscreen ? 'block' : 'none';

            // Reset edit modes when exiting fullscreen
            if (!isFullscreen) {
                linkMode = false;
                deleteMode = false;
                selectedSourceNode = null;
                document.getElementById('link-mode-btn')?.classList.remove('active');
                document.getElementById('delete-mode-btn')?.classList.remove('active');
                updateEditStatus();
            }

            // Re-render graph to fit new size after transition
            setTimeout(() => {
                if (window.lastGraphData) {
                    renderGraph(window.lastGraphData);
                }
            }, 50);
        }

        // Close fullscreen on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const panel = document.querySelector('.graph-panel');
                if (panel && panel.classList.contains('fullscreen')) {
                    toggleGraphFullscreen();
                }
            }
        });

        // Start initialization
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', tryInitDashboard);
        } else {
            // DOM already ready, just wait for D3
            setTimeout(tryInitDashboard, 50);
        }

        // Scrollbar visibility on scroll (hide after 1s of no scrolling)
        function setupScrollFade(selector) {
            document.querySelectorAll(selector).forEach(el => {
                let timeout;
                el.addEventListener('scroll', function() {
                    this.classList.add('scrolling');
                    clearTimeout(timeout);
                    timeout = setTimeout(() => {
                        this.classList.remove('scrolling');
                    }, 1000);
                });
            });
        }
        setupScrollFade('.tree-container');
        setupScrollFade('.panel-content');
        setupScrollFade('.preview-content');
    </script>
    <div class="graph-tooltip" id="graph-tooltip"></div>
</body>
</html>
