        // Smart refresh notes preview
        async function refreshNotesPreview() {
            try {
                const res = await fetch('/api/notes');
                if (!res.ok) return;
                const notes = await res.json();
                const newHash = hashData(notes);
                if (newHash !== lastNotesHash) {
                    lastNotesHash = newHash;
                    const container = document.getElementById('notes-preview');
                    if (!notes || notes.length === 0) {
                        container.innerHTML = '<p class="empty-message">No notes yet</p>';
                        return;
                    }
                    container.innerHTML = notes.slice(0, 5).map(note => `
                        <div class="note-item" onclick="openFilePreview('notes/${note.filename}')" style="cursor: pointer;">
                            <h4>${note.title}</h4>
                            <p class="preview">${note.preview || ''}</p>
                            <div class="meta">${note.modified_ago}</div>
                        </div>
                    `).join('');
                }
            } catch (err) {
                // Silent fail
            }
        }

        // Directory color mapping for graph - modern pastel palette
        const dirColors = {
            resources: '#60a5fa',  // Blue
            codebases: '#a855f7',  // Deep purple
            history: '#f87171',    // Red
            notes: '#fbbf24',      // Yellow (sticky note)
            other: '#94a3b8'       // Slate gray
        };

        // Track graph data to detect changes
        let lastGraphHash = null;

        function hashGraphData(data) {
            // Simple hash based on node/edge counts and IDs
            const nodeIds = data.nodes.map(n => n.id).sort().join(',');
            const edgeIds = data.edges.map(e => `${e.source}-${e.target}`).sort().join(',');
            return `${data.nodes.length}:${data.edges.length}:${nodeIds}:${edgeIds}`;
        }

        // Initialize and render graph
        async function initGraph() {
            try {
                const response = await fetch('/api/graph');
                const data = await response.json();
                renderGraph(data);
                lastGraphHash = hashGraphData(data);
            } catch (error) {
                console.error('Failed to load graph:', error);
                document.getElementById('graph-stats').textContent = 'Failed to load graph';
            }
        }

        // Refresh graph only if data changed
        async function refreshGraph() {
            try {
                const response = await fetch('/api/graph');
                const data = await response.json();
                const newHash = hashGraphData(data);
                if (newHash !== lastGraphHash) {
                    renderGraph(data);
                    lastGraphHash = newHash;
                }
            } catch (error) {
                console.error('Failed to refresh graph:', error);
            }
        }

        function renderGraph(data) {
            // Store data for re-rendering on resize/fullscreen
            window.lastGraphData = data;

            const container = document.querySelector('.graph-container');
            const svg = d3.select('#graph-svg');
            const tooltip = document.getElementById('graph-tooltip');
            const statsEl = document.getElementById('graph-stats');

            // Save previous node positions so re-renders don't explode from scratch
            const prevPositions = new Map();
            if (window.currentSimulation) {
                window.currentSimulation.nodes().forEach(n => {
                    prevPositions.set(n.id, { x: n.x, y: n.y });
                });
                window.currentSimulation.stop();
            }

            svg.selectAll('*').remove();
            // Reset SVG dimensions before measuring so it doesn't inflate the container
            svg.attr('width', null).attr('height', null);

            const width = container.clientWidth;
            const height = container.clientHeight;

            svg.attr('width', width).attr('height', height);

            if (data.nodes.length === 0) {
                statsEl.textContent = 'No files found';
                return;
            }

            const nodeMap = new Map(data.nodes.map(n => [n.id, n]));
            let links = data.edges.map(e => ({
                source: e.source,
                target: e.target,
                link_text: e.link_text
            })).filter(e => nodeMap.has(e.source) && nodeMap.has(e.target));

            // Add custom links from localStorage
            const existingLinks = new Set(links.map(l => `${l.source}-${l.target}`));
            for (const cl of customLinks) {
                if (nodeMap.has(cl.source) && nodeMap.has(cl.target)) {
                    const key = `${cl.source}-${cl.target}`;
                    const reverseKey = `${cl.target}-${cl.source}`;
                    if (!existingLinks.has(key) && !existingLinks.has(reverseKey)) {
                        existingLinks.add(key);
                        links.push({
                            source: cl.source,
                            target: cl.target,
                            link_text: cl.link_text || 'custom link',
                            isCustom: true
                        });
                    }
                }
            }

            // Build set of linked node IDs and link map (before any filtering)
            const linkedNodeIds = new Set();
            const linkMap = new Map(); // nodeId -> Set of connected nodeIds
            links.forEach(l => {
                const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                linkedNodeIds.add(sourceId);
                linkedNodeIds.add(targetId);
                if (!linkMap.has(sourceId)) linkMap.set(sourceId, new Set());
                if (!linkMap.has(targetId)) linkMap.set(targetId, new Set());
                linkMap.get(sourceId).add(targetId);
                linkMap.get(targetId).add(sourceId);
            });

            // Always keep a full node map available for cluster preview lookups
            window.lastFullNodeMap = new Map(data.nodes.map(n => [n.id, n]));

            // Always compute connected components — needed for separation force and
            // cluster button visibility, regardless of whether color mode is on.
            {
                const result = computeClusters(data.nodes, linkMap);
                clusterMap = result.nodeToCluster;
                clusterColors = result.colors;
                clusterNodes = result.nodesByCluster;
                rebuildClusterDisplayNames();
            }

            // Show the Clusters button only when there are ≥2 multi-node clusters
            {
                let linkedClusterCount = 0;
                clusterNodes.forEach(nodeIds => { if (nodeIds.length > 1) linkedClusterCount++; });
                const clusterBtn = document.getElementById('cluster-mode-btn');
                if (linkedClusterCount < 2) {
                    clusterBtn.style.display = 'none';
                    if (colorByCluster) {
                        colorByCluster = false;
                        clusterBtn.classList.remove('active');
                    }
                } else {
                    clusterBtn.style.display = '';
                }
                updateClusterLegend();
            }

            // Apply directory filter - identify primary nodes
            let primaryNodeIds = new Set();
            let filteredNodes = data.nodes;
            if (activeDirectoryFilters.size > 0) {
                filteredNodes = data.nodes.filter(n => activeDirectoryFilters.has(n.directory));
                primaryNodeIds = new Set(filteredNodes.map(n => n.id));
            }

            // Apply connection filter
            if (connectionFilter === 'linked') {
                filteredNodes = filteredNodes.filter(n => linkedNodeIds.has(n.id));

                // If directory filter is active, also include connected nodes from other directories (as secondary)
                if (activeDirectoryFilters.size > 0) {
                    const secondaryNodeIds = new Set();
                    filteredNodes.forEach(n => {
                        const connected = linkMap.get(n.id);
                        if (connected) {
                            connected.forEach(connectedId => {
                                if (!primaryNodeIds.has(connectedId)) {
                                    secondaryNodeIds.add(connectedId);
                                }
                            });
                        }
                    });
                    // Add secondary nodes
                    data.nodes.forEach(n => {
                        if (secondaryNodeIds.has(n.id)) {
                            filteredNodes.push({...n, isSecondary: true});
                        }
                    });
                }
            } else if (connectionFilter === 'unlinked') {
                filteredNodes = filteredNodes.filter(n => !linkedNodeIds.has(n.id));
            }

            const filteredNodeIds = new Set(filteredNodes.map(n => n.id));
            const secondaryNodeIds = new Set(filteredNodes.filter(n => n.isSecondary).map(n => n.id));

            // Filter links to only include those between visible nodes
            // Mark links as secondary if they connect to a secondary node
            links = links.filter(l => {
                const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                return filteredNodeIds.has(sourceId) && filteredNodeIds.has(targetId);
            }).map(l => {
                const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                return {
                    ...l,
                    isSecondary: secondaryNodeIds.has(sourceId) || secondaryNodeIds.has(targetId)
                };
            });

            const nodes = filteredNodes.map(n => {
                const prev = prevPositions.get(n.id);
                return prev ? { ...n, x: prev.x, y: prev.y } : { ...n };
            });

            statsEl.textContent = `${nodes.length} files, ${links.length} links`;

            // Create a group for zoom/pan
            const g = svg.append('g');

            // Add zoom behavior
            const zoom = d3.zoom()
                .scaleExtent([0.1, 4])
                .on('zoom', (event) => {
                    g.attr('transform', event.transform);
                });

            svg.call(zoom);

            // Store references for external zoom control
            window.graphZoom = zoom;
            window.graphSvg = svg;

            // Add double-click to reset zoom
            svg.on('dblclick.zoom', () => {
                fitAllNodes(true);
            });

            // Pre-compute degree so forces can scale with connectivity
            nodes.forEach(n => {
                n.degree = linkMap.has(n.id) ? linkMap.get(n.id).size : 0;
            });

            // Use a lower starting alpha when we have previous positions — nodes are
            // already close to equilibrium so a gentle nudge is all that's needed.
            // Custom force: push overlapping clusters apart by treating each cluster
            // as a circle (centroid + radius). Prevents clusters from drifting into
            // each other when they have no linking edges between them.
            function clusterSeparationForce(alpha) {
                // Build centroid + radius per cluster from current node positions
                const info = new Map();
                for (const n of nodes) {
                    const cid = clusterMap.get(n.id);
                    if (cid === undefined) continue;
                    if (!info.has(cid)) info.set(cid, { x: 0, y: 0, count: 0, r: 0, nodes: [] });
                    const c = info.get(cid);
                    c.x += n.x; c.y += n.y; c.count++; c.nodes.push(n);
                }
                info.forEach(c => { c.x /= c.count; c.y /= c.count; });
                info.forEach(c => {
                    for (const n of c.nodes) {
                        const d = Math.sqrt((n.x - c.x) ** 2 + (n.y - c.y) ** 2);
                        if (d > c.r) c.r = d;
                    }
                    c.r += 50; // padding gap between clusters
                });

                const ids = [...info.keys()];
                for (let i = 0; i < ids.length; i++) {
                    for (let j = i + 1; j < ids.length; j++) {
                        const a = info.get(ids[i]);
                        const b = info.get(ids[j]);
                        const dx = b.x - a.x;
                        const dy = b.y - a.y;
                        const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
                        const minDist = a.r + b.r;
                        if (dist < minDist) {
                            // Move each cluster's centroid by half the overlap — translate
                            // every node in the cluster by the same amount (rigid body move).
                            const overlap = (minDist - dist) / dist;
                            const fx = dx * overlap * alpha * 1.5;
                            const fy = dy * overlap * alpha * 1.5;
                            for (const n of a.nodes) { n.x -= fx * 0.5; n.y -= fy * 0.5; }
                            for (const n of b.nodes) { n.x += fx * 0.5; n.y += fy * 0.5; }
                        }
                    }
                }
            }

            const hasHistory = prevPositions.size > 0;
            const simulation = d3.forceSimulation(nodes)
                .alpha(hasHistory ? 0.15 : 0.4)
                .alphaDecay(0.04)
                .force('link', d3.forceLink(links).id(d => d.id)
                    .distance(d => 80 + (d.source.degree + d.target.degree) * 6)
                    .strength(0.5))
                .force('charge', d3.forceManyBody()
                    .strength(d => -80 - d.degree * 25)
                    .distanceMax(500))
                .force('x', d3.forceX(width / 2).strength(d => d.degree === 0 ? 0.10 : 0.02))
                .force('y', d3.forceY(height / 2).strength(d => d.degree === 0 ? 0.10 : 0.02))
                .force('collision', d3.forceCollide().radius(d => Math.max(18, 9 + d.name.length * 2)))
                .force('clusterSeparation', clusterSeparationForce);

            window.currentSimulation = simulation;

            // Soft shadow for polished look
            const defs = g.append('defs');
            const filter = defs.append('filter')
                .attr('id', 'node-glow')
                .attr('x', '-100%')
                .attr('y', '-100%')
                .attr('width', '300%')
                .attr('height', '300%');
            filter.append('feDropShadow')
                .attr('dx', '0')
                .attr('dy', '1')
                .attr('stdDeviation', '2.5')
                .attr('flood-color', 'rgba(0,0,0,0.18)');

            const link = g.append('g')
                .attr('class', 'links')
                .selectAll('line')
                .data(links)
                .join('line')
                .attr('class', d => 'graph-link' + (deleteMode ? ' graph-link-deletable' : ''))
                .attr('stroke', '#cbd5e1')
                .attr('stroke-width', 1.5)
                .attr('opacity', d => d.isSecondary ? 0.35 : 1)
                .on('mouseover', function(event, d) {
                    if (deleteMode) {
                        d3.select(this).attr('stroke', '#ef4444').attr('stroke-width', 3);
                    } else {
                        d3.select(this).attr('stroke', '#3EB489').attr('stroke-width', 2.5);
                    }
                    tooltip.innerHTML = `${d.source.name || d.source} → ${d.target.name || d.target}${d.isCustom ? ' (custom)' : ''}`;
                    tooltip.style.left = event.clientX + 12 + 'px';
                    tooltip.style.top = event.clientY + 12 + 'px';
                    tooltip.classList.add('visible');
                })
                .on('mouseout', function() {
                    d3.select(this).attr('stroke', '#cbd5e1').attr('stroke-width', 1.5);
                    tooltip.classList.remove('visible');
                })
                .on('click', function(event, d) {
                    handleLinkClickForDeletion(event, d);
                });

            const node = g.append('g')
                .attr('class', 'nodes')
                .selectAll('g')
                .data(nodes)
                .join('g')
                .attr('class', d => 'graph-node' + (selectedSourceNode && d.id === selectedSourceNode.id ? ' graph-node-selected' : ''))
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended))
                .on('mouseover', function(event, d) {
                    if (linkMode) {
                        d3.select(this).select('circle').attr('stroke', '#3EB489').attr('stroke-width', 2);
                    }
                    // Highlight connected links in golden
                    link.each(function(l) {
                        const sourceId = typeof l.source === 'string' ? l.source : l.source.id;
                        const targetId = typeof l.target === 'string' ? l.target : l.target.id;
                        if (sourceId === d.id || targetId === d.id) {
                            d3.select(this).attr('stroke', '#3EB489').attr('stroke-width', 2.5);
                        }
                    });
                    tooltip.textContent = d.name;
                    tooltip.style.left = event.clientX + 12 + 'px';
                    tooltip.style.top = event.clientY + 12 + 'px';
                    tooltip.classList.add('visible');
                })
                .on('mouseout', function(d) {
                    if (linkMode && !(selectedSourceNode && d3.select(this).datum().id === selectedSourceNode.id)) {
                        d3.select(this).select('circle').attr('stroke', null).attr('stroke-width', null);
                    }
                    // Reset link colors (preserve opacity for secondary links)
                    link.attr('stroke', '#cbd5e1').attr('stroke-width', 1.5)
                        .attr('opacity', l => l.isSecondary ? 0.35 : 1);
                    tooltip.classList.remove('visible');
                })
                .on('click', function(event, d) {
                    if (linkMode) {
                        handleNodeClickForLinking(event, d);
                    } else if (!deleteMode) {
                        event.stopPropagation();
                        if (colorByCluster) {
                            openClusterPreview(clusterMap.get(d.id));
                        } else {
                            openFilePreview(d.id);
                        }
                    }
                });

            node.append('circle')
                .attr('r', 9)
                .attr('fill', d => colorByCluster
                    ? (clusterColors[clusterMap.get(d.id)] || '#94a3b8')
                    : (dirColors[d.directory] || dirColors.other))
                .attr('opacity', d => d.isSecondary ? 0.35 : 1)
                .attr('filter', 'url(#node-glow)');

            node.append('text')
                .attr('dx', 14)
                .attr('dy', 4)
                .attr('opacity', d => d.isSecondary ? 0.4 : 1)
                .text(d => d.name.length > 20 ? d.name.slice(0, 17) + '...' : d.name);

            // Store selections for cluster filter to mutate without re-render
            window.graphNodeSelection = node;
            window.graphLinkSelection = link;

            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);

                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });

            // Pre-tick to get stable positions before first paint, avoiding jarring zoom jump
            simulation.stop();
            const preTicks = hasHistory ? 20 : 150;
            for (let i = 0; i < preTicks; i++) simulation.tick();
            link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
                .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
            node.attr('transform', d => `translate(${d.x},${d.y})`);

            // Set initial zoom based on mode
            const isFullscreen = document.querySelector('.graph-panel')?.classList.contains('fullscreen');
            if (isFullscreen) {
                fitAllNodes(false);
            } else {
                // Moderate zoom centered on the simulation's gravity center
                svg.call(zoom.transform,
                    d3.zoomIdentity
                        .translate(width / 2, height / 2)
                        .scale(0.75)
                        .translate(-width / 2, -height / 2)
                );
            }
            simulation.restart();

            // Restore cluster filter dimming after re-render
            if (activeClusterFilter.size > 0) applyClusterFilter();

            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }

            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }

            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
        }

        // Re-render graph on window resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            if (currentView === 'dashboard') {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(initGraph, 250);
            }
        });

        // Initial load
        loadTree();
    </script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        // Auto-refresh with smart change detection (only re-renders if data changed)
        let refreshInterval = null;
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                // Smart refresh tree (only re-renders if changed)
                refreshTree();
                if (currentView === 'dashboard') {
                    refreshRecentFiles();
                    refreshNotesPreview();
                    refreshGraph();
                } else if (currentView === 'browser') {
                    refreshFiles();
                }
            }, 3000);
        }

        // Initialize dashboard after D3 is ready
        function tryInitDashboard() {
            if (typeof d3 !== 'undefined') {
                // Load each panel independently so one failure doesn't block others
                loadRecentFiles();
                loadNotesPreview();
                initGraph();
                startAutoRefresh();

                // Check for preview URL parameter
                handlePreviewUrlParam();
            } else {
                // D3 not ready yet, retry
                setTimeout(tryInitDashboard, 100);
            }
        }

        // Handle ?preview=path URL parameter to open file preview directly
        function handlePreviewUrlParam() {
            const urlParams = new URLSearchParams(window.location.search);
            const previewFilePath = urlParams.get('preview');
            const isFullscreenMode = urlParams.get('fullscreen') === 'true';

            if (previewFilePath) {
                const panel = document.getElementById('preview-panel');

                // If fullscreen mode, add fullscreen class immediately before loading
                if (isFullscreenMode && panel) {
                    panel.classList.add('fullscreen');
                    document.getElementById('preview-fullscreen-expand').style.display = 'none';
                    document.getElementById('preview-fullscreen-collapse').style.display = 'block';
                }

                // Open the file preview
                openFilePreview(previewFilePath);

                // For non-fullscreen mode, still toggle after delay
                if (!isFullscreenMode) {
                    setTimeout(() => {
                        if (panel && !panel.classList.contains('fullscreen')) {
                            togglePreviewFullscreen();
                        }
                    }, 100);
                }

                // Clean up URL without reloading
                window.history.replaceState({}, '', window.location.pathname);
            }
        }

        // Graph link editing state
        let linkMode = false;
        let deleteMode = false;
        let selectedSourceNode = null;
        let customLinks = JSON.parse(localStorage.getItem('santai-custom-links') || '[]');

        // Graph filter state
        let activeDirectoryFilters = new Set(); // Empty means show all
        let connectionFilter = 'all'; // 'all', 'linked', 'unlinked'
        let colorByCluster = false;
        let activeClusterFilter = new Set(); // set of clusterIds; empty = show all
        let clusterMap = new Map();    // nodeId -> clusterId (index)
        let clusterColors = {};        // clusterId -> hex color
        let clusterNodes = new Map();  // clusterId -> [nodeIds]
        let clusterDisplayNames = new Map(); // clusterId -> deduped display name

        function toggleDirectoryFilter(directory) {
            const item = document.querySelector(`.graph-legend-item[data-directory="${directory}"]`);
            if (activeDirectoryFilters.has(directory)) {
                activeDirectoryFilters.delete(directory);
                item?.classList.remove('active');
            } else {
                activeDirectoryFilters.add(directory);
                item?.classList.add('active');
            }
            // Update dimmed states
            document.querySelectorAll('.graph-legend-item').forEach(el => {
                const dir = el.dataset.directory;
                if (activeDirectoryFilters.size > 0 && !activeDirectoryFilters.has(dir)) {
                    el.classList.add('dimmed');
                } else {
                    el.classList.remove('dimmed');
                }
            });
            const dirClearBtn = document.getElementById('dir-clear-btn');
            if (dirClearBtn) dirClearBtn.style.display = activeDirectoryFilters.size > 0 ? '' : 'none';
            // Re-render graph with filters
            if (window.lastGraphData) {
                renderGraph(window.lastGraphData);
            }
            // If all filters were manually deselected (back to show-all), zoom out to fit
            if (activeDirectoryFilters.size === 0) {
                setTimeout(() => fitAllNodes(true), 50);
            }
        }

        function clearDirectoryFilter() {
            activeDirectoryFilters.clear();
            document.querySelectorAll('.graph-legend-item').forEach(el => el.classList.remove('active', 'dimmed'));
            const dirClearBtn = document.getElementById('dir-clear-btn');
            if (dirClearBtn) dirClearBtn.style.display = 'none';
            if (window.lastGraphData) renderGraph(window.lastGraphData);
        }

        function setConnectionFilter(filter) {
            connectionFilter = filter;
            // Only toggle the connection filter buttons (not the Clusters button)
            document.querySelectorAll('.graph-filter-btn[data-filter]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            // Clusters mode is meaningless on Unlinked — turn it off
            if (filter === 'unlinked' && colorByCluster) {
                colorByCluster = false;
                activeClusterFilter = new Set();
                document.getElementById('cluster-mode-btn').classList.remove('active');
                updateClusterLegend();
            }
            if (window.lastGraphData) {
                renderGraph(window.lastGraphData);
            }
            // If switching back to all, zoom out to fit the whole graph
            if (filter === 'all') {
                setTimeout(() => fitAllNodes(true), 50);
            }
        }

        // Names are keyed by the lex-first node ID in the cluster — stable across re-renders
        const clusterNames = JSON.parse(localStorage.getItem('santai-cluster-names') || '{}');

        function getClusterKey(clusterId) {
            const nodeIds = clusterNodes.get(clusterId) || [];
            return nodeIds.slice().sort()[0] || String(clusterId);
        }

        // Raw suggestion for a single cluster (may duplicate across clusters)
        function suggestClusterName(clusterId) {
            const nodeIds = clusterNodes.get(clusterId) || [];
            if (!nodeIds.length) return `Cluster ${clusterId + 1}`;
            const nodeMap = window.lastFullNodeMap || new Map();
            const nodes = nodeIds.map(id => nodeMap.get(id)).filter(Boolean);
            const dirs = new Set(nodes.map(n => n.directory));
            if (dirs.size === 1) return [...dirs][0];
            const names = nodes.slice(0, 2)
                .map(n => n.name.replace(/\.[^.]+$/, ''))
                .filter(Boolean);
            return names.join(' · ').slice(0, 22) || `Cluster ${clusterId + 1}`;
        }

        // Build deduped display names for all multi-node clusters at once
        function rebuildClusterDisplayNames() {
            clusterDisplayNames = new Map();
            const seen = new Map(); // base name -> count of auto-names used
            const ids = [];
            clusterNodes.forEach((nodeIds, cid) => { if (nodeIds.length > 1) ids.push(cid); });
            ids.sort((a, b) => a - b);
            for (const cid of ids) {
                const saved = clusterNames[getClusterKey(cid)];
                if (saved) { clusterDisplayNames.set(cid, saved); continue; }
                const base = suggestClusterName(cid);
                if (!seen.has(base)) {
                    seen.set(base, 1);
                    clusterDisplayNames.set(cid, base);
                } else {
                    const n = seen.get(base) + 1;
                    seen.set(base, n);
                    clusterDisplayNames.set(cid, `${base} ${n}`);
                }
            }
        }

        function getClusterDisplayName(clusterId) {
            return clusterDisplayNames.get(clusterId) || suggestClusterName(clusterId);
        }

        function updateClusterLegend() {
            const dirEl = document.getElementById('graph-dir-legend');
            const clusterEl = document.getElementById('graph-cluster-legend');
            if (!dirEl || !clusterEl) return;

            if (!colorByCluster) {
                dirEl.style.display = '';
                clusterEl.style.display = 'none';
                clusterEl.innerHTML = '';
                const clusterClearBtn = document.getElementById('cluster-clear-btn');
                if (clusterClearBtn) clusterClearBtn.style.display = 'none';
                // Restore dir clear button visibility
                const dirClearBtn = document.getElementById('dir-clear-btn');
                if (dirClearBtn) dirClearBtn.style.display = activeDirectoryFilters.size > 0 ? '' : 'none';
                return;
            }

            dirEl.style.display = 'none';
            clusterEl.innerHTML = '';

            const entries = [];
            clusterNodes.forEach((nodeIds, cid) => {
                if (nodeIds.length > 1) {
                    entries.push({ cid, color: clusterColors[cid] || '#94a3b8', name: getClusterDisplayName(cid) });
                }
            });
            entries.sort((a, b) => a.cid - b.cid);

            entries.forEach(({ cid, color, name }) => {
                const item = document.createElement('div');
                item.className = 'graph-cluster-legend-item' + (activeClusterFilter.has(cid) ? ' active' : '');
                item.dataset.clusterId = cid;
                item.title = name;
                item.onclick = () => toggleClusterFilter(cid);
                item.innerHTML = `
                    <span class="graph-legend-color" style="background:${color};flex-shrink:0;"></span>
                    <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${name}</span>`;
                clusterEl.appendChild(item);
            });

            clusterEl.style.display = entries.length ? '' : 'none';
        }

        // ── Cluster filtering ─────────────────────────────────────────────────────

        function toggleClusterFilter(cid) {
            if (activeClusterFilter.has(cid)) {
                activeClusterFilter.delete(cid);
            } else {
                activeClusterFilter.add(cid);
            }
            applyClusterFilter();
            document.querySelectorAll('.graph-cluster-legend-item').forEach(el => {
                el.classList.toggle('active', activeClusterFilter.has(Number(el.dataset.clusterId)));
            });
            const clearBtn = document.getElementById('cluster-clear-btn');
            if (clearBtn) clearBtn.style.display = activeClusterFilter.size > 0 ? '' : 'none';
            if (activeClusterFilter.size > 0) zoomToSelectedClusters();
            else fitAllNodes(true);
        }

        function clearClusterFilter() {
            activeClusterFilter.clear();
            applyClusterFilter();
            document.querySelectorAll('.graph-cluster-legend-item').forEach(el => el.classList.remove('active'));
            const clearBtn = document.getElementById('cluster-clear-btn');
            if (clearBtn) clearBtn.style.display = 'none';
            fitAllNodes(true);
        }

        function applyClusterFilter() {
            const nodeSel = window.graphNodeSelection;
            const linkSel = window.graphLinkSelection;
            if (!nodeSel) return;
            const none = activeClusterFilter.size === 0;
            nodeSel.attr('opacity', d => {
                if (none) return d.isSecondary ? 0.35 : 1;
                return activeClusterFilter.has(clusterMap.get(d.id)) ? 1 : 0.12;
            });
            nodeSel.select('text').attr('opacity', d => {
                if (none) return d.isSecondary ? 0.4 : 1;
                return activeClusterFilter.has(clusterMap.get(d.id)) ? 1 : 0.08;
            });
            if (linkSel) {
                linkSel.attr('opacity', d => {
                    if (none) return d.isSecondary ? 0.35 : 1;
                    const sid = typeof d.source === 'string' ? d.source : d.source.id;
                    const tid = typeof d.target === 'string' ? d.target : d.target.id;
                    return activeClusterFilter.has(clusterMap.get(sid)) &&
                           activeClusterFilter.has(clusterMap.get(tid)) ? 1 : 0.05;
                });
            }
        }

        function fitAllNodes(animated = false) {
            if (!window.currentSimulation || !window.graphSvg || !window.graphZoom) return;
            const allNodes = window.currentSimulation.nodes() || [];
            if (!allNodes.length) return;
            const xs = allNodes.map(n => n.x);
            const ys = allNodes.map(n => n.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            const container = document.querySelector('.graph-container');
            const cw = container.clientWidth, ch = container.clientHeight;
            const pad = 60;
            const scaleX = (cw - pad * 2) / Math.max(maxX - minX, 40);
            const scaleY = (ch - pad * 2) / Math.max(maxY - minY, 40);
            const scale = Math.min(scaleX, scaleY, 2);
            const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
            const t = window.graphSvg.transition().duration(animated ? 450 : 0);
            t.call(window.graphZoom.transform, d3.zoomIdentity.translate(cw / 2, ch / 2).scale(scale).translate(-cx, -cy));
        }

        function zoomToSelectedClusters() {
            if (!window.currentSimulation || !window.graphSvg || !window.graphZoom) return;
            const clusterNodeList = (window.currentSimulation.nodes() || [])
                .filter(n => activeClusterFilter.has(clusterMap.get(n.id)));
            if (!clusterNodeList.length) return;
            const xs = clusterNodeList.map(n => n.x);
            const ys = clusterNodeList.map(n => n.y);
            const minX = Math.min(...xs), maxX = Math.max(...xs);
            const minY = Math.min(...ys), maxY = Math.max(...ys);
            const container = document.querySelector('.graph-container');
            const cw = container.clientWidth, ch = container.clientHeight;
            const pad = 90;
            const scaleX = (cw - pad * 2) / Math.max(maxX - minX, 40);
            const scaleY = (ch - pad * 2) / Math.max(maxY - minY, 40);
            const scale = Math.min(scaleX, scaleY, 3);
            const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
            window.graphSvg.transition().duration(450).call(
                window.graphZoom.transform,
                d3.zoomIdentity.translate(cw / 2, ch / 2).scale(scale).translate(-cx, -cy)
            );
        }

        function saveClusterName(clusterId, name) {
            const key = getClusterKey(clusterId);
            if (name.trim()) {
                clusterNames[key] = name.trim();
            } else {
                delete clusterNames[key];
            }
            localStorage.setItem('santai-cluster-names', JSON.stringify(clusterNames));
        }

        function startClusterRename() {
            const id = window.activeClusterId;
            if (id === null || id === undefined) return;
            const h2 = document.getElementById('preview-filename');
            const saved = clusterNames[getClusterKey(id)];
            const current = saved || '';
            const suggested = suggestClusterName(id);
            const nodeCount = (clusterNodes.get(id) || []).length;

            const input = document.createElement('input');
            input.type = 'text';
            input.value = current;
            input.placeholder = suggested;
            input.style.cssText = 'font-size:inherit;font-weight:inherit;border:none;border-bottom:1.5px solid var(--accent);background:transparent;outline:none;width:100%;color:inherit;';

            h2.replaceWith(input);
            input.focus();
            input.select();

            const commit = () => {
                saveClusterName(id, input.value);
                rebuildClusterDisplayNames();
                const newH2 = document.createElement('h2');
                newH2.id = 'preview-filename';
                newH2.textContent = getClusterDisplayName(id);
                input.replaceWith(newH2);
                updateClusterLegend();
            };

            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
                if (e.key === 'Escape') { input.value = current; input.blur(); }
            });
            input.addEventListener('blur', commit);
        }

        // ── Cluster mode ──────────────────────────────────────────────────────────

        const CLUSTER_PALETTE = [
            '#f97316', '#06b6d4', '#84cc16', '#ec4899', '#f59e0b',
            '#8b5cf6', '#14b8a6', '#22c55e', '#fb923c', '#f472b6',
            '#facc15', '#2dd4bf', '#a78bfa', '#e879f9', '#4ade80',
        ];

        function computeClusters(allNodes, linkMap) {
            const visited = new Set();
            const clusters = [];

            for (const node of allNodes) {
                if (visited.has(node.id)) continue;
                const cluster = [];
                const queue = [node.id];
                while (queue.length > 0) {
                    const nid = queue.shift();
                    if (visited.has(nid)) continue;
                    visited.add(nid);
                    cluster.push(nid);
                    const neighbors = linkMap.get(nid);
                    if (neighbors) {
                        for (const nb of neighbors) {
                            if (!visited.has(nb)) queue.push(nb);
                        }
                    }
                }
                clusters.push(cluster);
            }

            // Largest clusters first so they get the most prominent palette entries
            clusters.sort((a, b) => b.length - a.length);

            const nodeToCluster = new Map();
            const colors = {};
            const nodesByCluster = new Map();
            let paletteIdx = 0;

            clusters.forEach((cluster, i) => {
                // Isolated nodes (size 1) all share a neutral color so the palette
                // is reserved for actual clusters
                const color = cluster.length > 1
                    ? CLUSTER_PALETTE[paletteIdx++ % CLUSTER_PALETTE.length]
                    : '#64748b';
                colors[i] = color;
                nodesByCluster.set(i, cluster);
                for (const nid of cluster) nodeToCluster.set(nid, i);
            });

            return { nodeToCluster, colors, nodesByCluster };
        }

        function toggleClusterMode() {
            colorByCluster = !colorByCluster;
            document.getElementById('cluster-mode-btn').classList.toggle('active', colorByCluster);
            if (colorByCluster) {
                // Can't show clusters on Unlinked — move to All
                if (connectionFilter === 'unlinked') {
                    connectionFilter = 'all';
                    document.querySelectorAll('.graph-filter-btn[data-filter]').forEach(btn => {
                        btn.classList.toggle('active', btn.dataset.filter === 'all');
                    });
                }
                // Clear directory filters — they conflict with the cluster color view
                activeDirectoryFilters.clear();
                document.querySelectorAll('.graph-legend-item').forEach(el => {
                    el.classList.remove('active', 'dimmed');
                });
            } else {
                // Clear any active cluster filter when leaving cluster mode
                activeClusterFilter = new Set();
            }
            updateClusterLegend();
            if (window.lastGraphData) renderGraph(window.lastGraphData);
        }

        function openClusterPreview(clusterId) {
            if (clusterId === undefined || clusterId === null) return;
            const nodeIds = clusterNodes.get(clusterId) || [];
            const nodeMap = window.lastFullNodeMap || new Map();
            const panel = document.getElementById('preview-panel');
            const content = document.getElementById('preview-content');
            const color = clusterColors[clusterId] || '#64748b';
            const isIsolated = nodeIds.length === 1;

            // Showing the cluster list — no "back" context
            previewReturnClusterId = null;
            document.getElementById('preview-back-btn').style.display = 'none';
            // Cluster list gets pencil (rename), not new-window
            document.getElementById('preview-open-new-window-btn').style.display = 'none';
            document.getElementById('preview-cluster-rename-btn').style.display =
                isIsolated ? 'none' : '';
            // Hide file action buttons in cluster list view
            document.querySelector('.preview-actions').style.display = 'none';
            // Store active cluster id for rename function
            window.activeClusterId = isIsolated ? null : clusterId;

            panel.classList.add('show');
            document.body.classList.add('preview-open');

            const savedName = getClusterDisplayName(clusterId);
            document.getElementById('preview-filename').textContent =
                isIsolated ? 'Unlinked file' : (savedName || `Cluster (${nodeIds.length} files)`);
            document.getElementById('preview-size').textContent = '';

            if (isIsolated) {
                // Single isolated node — open its file preview directly
                const node = nodeMap.get(nodeIds[0]);
                if (node) openFilePreview(node.id);
                return;
            }

            const items = nodeIds.map(nid => {
                const n = nodeMap.get(nid);
                if (!n) return '';
                return `
                    <li onclick="openFilePreviewFromCluster('${n.id.replace(/'/g, "\\'")}', ${clusterId})">
                        <span class="cluster-file-dot" style="background:${color}"></span>
                        <span>${n.name}</span>
                        <span class="cluster-file-dir">${n.directory}</span>
                    </li>`;
            }).join('');

            content.innerHTML = `
                <div class="cluster-preview-header">
                    ${nodeIds.length} linked files &mdash; click to open
                </div>
                <ul class="cluster-file-list">${items}</ul>`;
        }

        function openFilePreviewFromCluster(path, clusterId) {
            previewReturnClusterId = clusterId;
            openFilePreview(path);
        }

        function goBackToCluster() {
            const id = previewReturnClusterId;
            previewReturnClusterId = null;
            openClusterPreview(id);
        }

        // ──────────────────────────────────────────────────────────────────────────

        function toggleLinkMode() {
            linkMode = !linkMode;
            if (linkMode) {
                deleteMode = false;
                document.getElementById('delete-mode-btn').classList.remove('active');
            }
            document.getElementById('link-mode-btn').classList.toggle('active', linkMode);
            selectedSourceNode = null;
            updateEditStatus();
            updateGraphInteraction();
        }

        function toggleDeleteMode() {
            deleteMode = !deleteMode;
            if (deleteMode) {
                linkMode = false;
                document.getElementById('link-mode-btn').classList.remove('active');
                selectedSourceNode = null;
            }
            document.getElementById('delete-mode-btn').classList.toggle('active', deleteMode);
            updateEditStatus();
            updateGraphInteraction();
        }

        function updateEditStatus() {
            const status = document.getElementById('graph-edit-status');
            if (linkMode) {
                if (selectedSourceNode) {
                    status.textContent = `Click another node to link from "${selectedSourceNode.name}"`;
                } else {
                    status.textContent = 'Click a node to start linking';
                }
            } else if (deleteMode) {
                status.textContent = 'Click a link to delete it';
            } else {
                status.textContent = '';
            }
        }

        function updateGraphInteraction() {
            const svg = d3.select('#graph-svg');

            // Update node selection styling
            svg.selectAll('.graph-node').classed('graph-node-selected', d => selectedSourceNode && d.id === selectedSourceNode.id);

            // Update link styling for delete mode
            svg.selectAll('.graph-link').classed('graph-link-deletable', deleteMode);
        }

        function handleNodeClickForLinking(event, d) {
            if (!linkMode) return;

            event.stopPropagation();

            if (!selectedSourceNode) {
                selectedSourceNode = d;
                updateEditStatus();
                updateGraphInteraction();
            } else if (selectedSourceNode.id !== d.id) {
                // Create the link
                createCustomLink(selectedSourceNode.id, d.id);
                selectedSourceNode = null;
                updateEditStatus();
                updateGraphInteraction();
            }
        }

        function createCustomLink(sourceId, targetId) {
            // Check if link already exists
            const exists = customLinks.some(l =>
                (l.source === sourceId && l.target === targetId) ||
                (l.source === targetId && l.target === sourceId)
            );

            if (exists) {
                showToast('Link already exists', true);
                return;
            }

            customLinks.push({ source: sourceId, target: targetId, link_text: 'custom link' });
            localStorage.setItem('santai-custom-links', JSON.stringify(customLinks));

            // Re-render graph with new link
            if (window.lastGraphData) {
                renderGraph(window.lastGraphData);
            }
            showToast('Link created');
        }

        function handleLinkClickForDeletion(event, d) {
            if (!deleteMode) return;

            event.stopPropagation();

            // Hide tooltip since the link will be removed
            document.getElementById('graph-tooltip').classList.remove('visible');

            // Find and remove the link
            const sourceId = d.source.id || d.source;
            const targetId = d.target.id || d.target;

            // Check if it's a custom link
            const customIndex = customLinks.findIndex(l =>
                (l.source === sourceId && l.target === targetId) ||
                (l.source === targetId && l.target === sourceId)
            );

            if (customIndex !== -1) {
                customLinks.splice(customIndex, 1);
                localStorage.setItem('santai-custom-links', JSON.stringify(customLinks));

                if (window.lastGraphData) {
                    renderGraph(window.lastGraphData);
                }
                showToast('Link deleted');
            } else {
                showToast('Cannot delete file-based links', true);
            }
        }

        function zoomGraph(factor) {
            if (!window.graphZoom || !window.graphSvg) return;
            window.graphSvg.transition().duration(200).call(
                window.graphZoom.scaleBy, factor
            );
        }

        function resetGraphView() {
            if (!window.graphZoom || !window.graphSvg) return;
            const isFullscreen = document.querySelector('.graph-panel')?.classList.contains('fullscreen');
            if (isFullscreen) {
                fitAllNodes(true);
            } else {
                const svg = d3.select('#graph-svg');
                const w = +svg.attr('width') || 400;
                const h = +svg.attr('height') || 300;
                window.graphSvg.transition().duration(300).call(
                    window.graphZoom.transform,
                    d3.zoomIdentity.translate(w / 2, h / 2).scale(0.75).translate(-w / 2, -h / 2)
                );
            }
        }

        async function manualRefreshGraph() {
            try {
                const res = await fetch('/api/graph');
                if (!res.ok) throw new Error('Failed to load graph');
                const data = await res.json();
                window.lastGraphData = data;
                lastGraphHash = hashGraphData(data);
                renderGraph(data);
                showToast('Graph refreshed');
            } catch (err) {
                showToast('Failed to refresh graph', true);
            }
        }

        // Track the original parent so we can return the panel on exit
        let _graphPanelOriginalParent = null;
        let _graphPanelNextSibling = null;

        function toggleGraphFullscreen() {
            const panel = document.querySelector('.graph-panel');
            const expandIcon = document.getElementById('fullscreen-icon-expand');
            const collapseIcon = document.getElementById('fullscreen-icon-collapse');

            const isFullscreen = panel.classList.contains('fullscreen');

            if (!isFullscreen) {
                // Entering fullscreen: move to <body> first, then add class — both in the same frame
                _graphPanelOriginalParent = panel.parentNode;
                _graphPanelNextSibling = panel.nextSibling;
                document.body.appendChild(panel);
                // Force a reflow so the browser registers the new DOM position before
                // applying the fullscreen styles, preventing a double-layout flash
                panel.getBoundingClientRect();
                panel.classList.add('fullscreen');
                expandIcon.style.display = 'none';
                collapseIcon.style.display = 'block';
            } else {
                // Exiting fullscreen: remove class first, then restore DOM position — same frame
                panel.classList.remove('fullscreen');
                panel.getBoundingClientRect();
                if (_graphPanelOriginalParent) {
                    _graphPanelOriginalParent.insertBefore(panel, _graphPanelNextSibling);
                    _graphPanelOriginalParent = null;
                    _graphPanelNextSibling = null;
                }
                expandIcon.style.display = 'block';
                collapseIcon.style.display = 'none';

                // Reset edit modes when exiting fullscreen
                linkMode = false;
                deleteMode = false;
                selectedSourceNode = null;
                document.getElementById('link-mode-btn')?.classList.remove('active');
                document.getElementById('delete-mode-btn')?.classList.remove('active');
                updateEditStatus();
            }

            // Resize SVG to new container dimensions and re-fit zoom — no full re-render,
            // so the graph content stays visible throughout the transition with no flash
            requestAnimationFrame(() => {
                const container = document.querySelector('.graph-container');
                const svg = d3.select('#graph-svg');
                if (container && svg) {
                    svg.attr('width', null).attr('height', null);
                    svg.attr('width', container.clientWidth).attr('height', container.clientHeight);
                }
                fitAllNodes(true);
            });
        }

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                e.preventDefault();
                e.stopPropagation();

                // In preview-only mode, go to home page
                if (document.documentElement.classList.contains('preview-only-mode')) {
                    window.location.href = '/';
                    return;
                }
                // Check preview panel first (higher z-index) - close it entirely
                const previewPanel = document.getElementById('preview-panel');
                if (previewPanel && previewPanel.classList.contains('show')) {
                    closePreview();
                    return;
                }
                // Then check graph panel fullscreen
                const graphPanel = document.querySelector('.graph-panel');
                if (graphPanel && graphPanel.classList.contains('fullscreen')) {
                    toggleGraphFullscreen();
                }
            }
        }, true); // Use capture phase to handle first

        // Start initialization
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', tryInitDashboard);
        } else {
            // DOM already ready, just wait for D3
            setTimeout(tryInitDashboard, 50);
        }

        // Float/unfloat graph legend so it appears above the preview panel
        // when the graph is fullscreen and a file preview is open.
        function updateFloatingLegend() {
            // Clean up any orphaned floating legends left on body (e.g. after graph re-render)
            document.querySelectorAll('body > .graph-legend.floating-legend').forEach(orphan => {
                const container = document.querySelector('.graph-container');
                // If there's already a legend inside the container, just remove the orphan
                if (container && container.querySelector('.graph-legend')) {
                    orphan.remove();
                }
            });

            const legend = document.querySelector('.graph-legend');
            if (!legend) return;
            const graphFullscreen = document.querySelector('.graph-panel.fullscreen');
            const previewOpen = document.body.classList.contains('preview-open');
            if (graphFullscreen && previewOpen) {
                // Move legend to body level so it escapes the graph panel stacking context
                if (!legend.classList.contains('floating-legend')) {
                    legend._originalParent = legend.parentNode;
                    legend._originalNext = legend.nextSibling;
                    document.body.appendChild(legend);
                    legend.classList.add('floating-legend');
                }
            } else {
                // Restore legend to its original position inside .graph-container
                if (legend.classList.contains('floating-legend') && legend._originalParent) {
                    legend.classList.remove('floating-legend');
                    if (legend._originalNext) {
                        legend._originalParent.insertBefore(legend, legend._originalNext);
                    } else {
                        legend._originalParent.appendChild(legend);
                    }
                }
            }
        }

        // Observe body class changes for preview-open to trigger legend float
        const _legendObserver = new MutationObserver(() => updateFloatingLegend());
        _legendObserver.observe(document.body, { attributes: true, attributeFilter: ['class'] });

        // Also hook into graph fullscreen toggle
        const _origToggleGraphFullscreen = toggleGraphFullscreen;
        toggleGraphFullscreen = function() {
            _origToggleGraphFullscreen();
            setTimeout(updateFloatingLegend, 60);
            // Run again after the delayed renderGraph (300ms for exit) to clean up
            // orphaned floating legends created by the re-render.
            setTimeout(updateFloatingLegend, 400);
        };

        // Scrollbar visibility on scroll (hide after 1s of no scrolling)
        function setupScrollFade(selector) {
            document.querySelectorAll(selector).forEach(el => {
                let timeout;
                el.addEventListener('scroll', function() {
                    this.classList.add('scrolling');
                    clearTimeout(timeout);
                    timeout = setTimeout(() => {
                        this.classList.remove('scrolling');
                    }, 1000);
                });
            });
        }
        setupScrollFade('.tree-container');
        setupScrollFade('.panel-content');
        setupScrollFade('.preview-content');
    </script>
    <div class="graph-tooltip" id="graph-tooltip"></div>
</body>
</html>
